function uid(){return Date.now().toString(36)+'_'+(++_uid)}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isoDate(s){if(!s)return '';const d=new Date(s);if(isNaN(d))return s;return d.toISOString().slice(0,10)}
function toast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isErr?' error':'')+' show';setTimeout(()=>t.className='toast',2500)}

let S;
function loadState(){
  try{
    const raw=localStorage.getItem('crfo_state');
    if(raw){
      const parsed=JSON.parse(raw);
      S={...DEFAULT_STATE,...parsed};
      if(!Array.isArray(S.shops)||!S.shops.length)S.shops=JSON.parse(JSON.stringify(DEFAULT_STATE.shops));
      S.shops.forEach(s=>{if(!s.freq){const def=DEFAULT_STATE.shops.find(d=>d.id===s.id);if(def)s.freq=def.freq}});
      // Enforce canonical shop order from DEFAULT_STATE
      const shopOrder=DEFAULT_STATE.shops.map(s=>s.id);S.shops.sort((a,b)=>{const ai=shopOrder.indexOf(a.id),bi=shopOrder.indexOf(b.id);return(ai===-1?999:ai)-(bi===-1?999:bi)});
      if(!Array.isArray(S.fiscalPeriods)||!S.fiscalPeriods.length)S.fiscalPeriods=JSON.parse(JSON.stringify(DEFAULT_STATE.fiscalPeriods));
      if(!Array.isArray(S.perfData))S.perfData=[];
      S.perfData=S.perfData.filter(r=>r.sales||r.ebitda);
      S.perfData.forEach(r=>{delete r.gp});
      const seen={};S.perfData=S.perfData.filter(r=>{const k=r.periodId+'_'+r.shopId;if(seen[k])return false;seen[k]=true;return true});
      const validPeriodIds=new Set(S.fiscalPeriods.map(p=>p.id));
      S.perfData=S.perfData.filter(r=>validPeriodIds.has(r.periodId));
      if(!Array.isArray(S.tasks))S.tasks=[];
      if(!Array.isArray(S.taskTemplates))S.taskTemplates=[];
      if(!S.shopMetrics)S.shopMetrics={};
      S.tasks.forEach(t=>{if(!t.assignedTo)t.assignedTo='';if(!t.completionNote)t.completionNote='';
        // Migrate onSite boolean → taskMode string
        if(!t.taskMode){if(t.onSite===false)t.taskMode='remote';else t.taskMode='onsite'}delete t.onSite;
        const catMap={equipment:'facility',vendor:'parts',process:'ops',admin:'ops'};if(catMap[t.category])t.category=catMap[t.category];
        if(t.estHours&&!t.estMins){t.estMins=Math.round(t.estHours*60);delete t.estHours}});
      S.taskTemplates.forEach(t=>{const catMap={equipment:'facility',vendor:'parts',process:'ops',admin:'ops'};if(catMap[t.category])t.category=catMap[t.category];
        if(!t.taskMode){if(t.onSite===false)t.taskMode='remote';else t.taskMode='onsite'}delete t.onSite;
        if(t.estHours&&!t.estMins){t.estMins=Math.round(t.estHours*60);delete t.estHours}});
      if(!Array.isArray(S.visits))S.visits=[];
      if(!Array.isArray(S.upcoming))S.upcoming=[];
      if(!Array.isArray(S.constraints))S.constraints=DEFAULT_STATE.constraints;
      if(!Array.isArray(S.routing))S.routing=DEFAULT_STATE.routing;
      if(!Array.isArray(S.traffic))S.traffic=DEFAULT_STATE.traffic;
      if(!Array.isArray(S.employees))S.employees=[];
      S.employees.forEach(emp=>{if(!Array.isArray(emp.milestones))emp.milestones=[];if(!Array.isArray(emp.checkins))emp.checkins=[];if(!emp.checkinCadence)emp.checkinCadence='biweekly';if(!emp.devPlan)emp.devPlan='';if(!Array.isArray(emp.promotions))emp.promotions=[]});
    }else{S=JSON.parse(JSON.stringify(DEFAULT_STATE))}
  }catch(e){console.error('State load error:',e);S=JSON.parse(JSON.stringify(DEFAULT_STATE))}
}
function save(){try{localStorage.setItem('crfo_state',JSON.stringify(S))}catch(e){toast('Storage error: '+e.message,true)}}

function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDate(d){const dt=typeof d==='string'?new Date(d+'T00:00:00'):d;return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fmtDateISO(d){const dt=typeof d==='string'?new Date(d+'T00:00:00'):d;return dt.toISOString().slice(0,10)}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(86400000))}
function todayISO(){return new Date().toISOString().slice(0,10)}
const DAYNAMES=['Monday','Tuesday','Wednesday','Thursday','Friday'];

// CR Company holidays 2026 (6 fixed + note about 1 floating)
const CR_HOLIDAYS=[
  {date:'2026-01-01',name:'New Year\'s Day'},
  {date:'2026-05-25',name:'Memorial Day'},
  {date:'2026-07-04',name:'Independence Day (observed 7/3)'},
  {date:'2026-09-07',name:'Labor Day'},
  {date:'2026-11-27',name:'Thanksgiving'},
  {date:'2026-12-25',name:'Christmas'}
];
function isHoliday(ds){return CR_HOLIDAYS.find(h=>h.date===ds)}

// Fiscal month helpers
function getFiscalMonth(ds){return S.fiscalPeriods.find(p=>ds>=p.start&&ds<=p.end)}
function fiscalBizDaysLeft(ds){
  const fp=getFiscalMonth(ds);if(!fp)return null;
  let count=0;const end=new Date(fp.end+'T00:00:00');const cur=new Date(ds+'T00:00:00');
  for(let d=new Date(cur);d<=end;d.setDate(d.getDate()+1)){
    const dow=d.getDay();if(dow>0&&dow<6){const iso=fmtDateISO(d);if(!isHoliday(iso))count++}
  }
  return count;
}
function fiscalBizDaysTotal(fp){
  let count=0;const start=new Date(fp.start+'T00:00:00'),end=new Date(fp.end+'T00:00:00');
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dow=d.getDay();if(dow>0&&dow<6){if(!isHoliday(fmtDateISO(d)))count++}
  }
  return count;
}
function isFiscalMonthEndFriday(ds){
  const fp=getFiscalMonth(ds);if(!fp)return false;
  const d=new Date(ds+'T00:00:00');if(d.getDay()!==5)return false;
  const end=new Date(fp.end+'T00:00:00');const diff=(end-d)/86400000;
  return diff<=2; // Friday within 2 days of fiscal month end (Sat)
}

function weekKey(d){const mon=getMonday(d);return 'crfo_w_'+mon.toISOString().slice(0,10)}
function loadWeekMeta(d){try{const raw=localStorage.getItem(weekKey(d));return raw?JSON.parse(raw):{shopsNeeded:[],wfhDays:[],dayReqs:{},dayEvents:{}}}catch(e){return{shopsNeeded:[],wfhDays:[],dayReqs:{},dayEvents:{}}}}
function saveWeekMeta(d,meta){try{localStorage.setItem(weekKey(d),JSON.stringify(meta))}catch(e){toast('Storage error',true)}}
function pruneOldWeeks(){const cutoff=new Date();cutoff.setDate(cutoff.getDate()-56);for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith('crfo_w_')){if(k.slice(7)<cutoff.toISOString().slice(0,10))localStorage.removeItem(k)}}}

// ========== SHOP STATUS ==========
function shopStatus(shop){
  const now=todayISO(),monthStart=now.slice(0,8)+'01';
  const sv=S.visits.filter(v=>v.shopId===shop.id).sort((a,b)=>b.date.localeCompare(a.date));
  const last=sv.length?sv[0]:null;
  const visitedThisMonth=sv.some(v=>v.date>=monthStart);
  const daysAgo=last?daysBetween(last.date,now):null;
  let urgency='red';
  if(visitedThisMonth&&daysAgo!==null&&daysAgo<=14)urgency='green';
  else if(visitedThisMonth)urgency='yellow';
  return{last,visitedThisMonth,daysAgo,urgency,visitCount:sv.length};
}

// ========== WEEK PAGE (redesigned: prompt top, itinerary, compact setup) ==========
let currentWeekStart=getMonday(new Date());

function getAutoShopsForWeek(){
  const monISO=fmtDateISO(currentWeekStart),friISO=fmtDateISO(addDays(currentWeekStart,4));
  const auto=new Set();
  S.tasks.filter(t=>t.status==='open'&&t.taskMode==='onsite'&&t.shopId!=='regional').forEach(t=>{
    if(t.priority===1)auto.add(t.shopId);
    else if(t.dueDate&&t.dueDate>=monISO&&t.dueDate<=friISO)auto.add(t.shopId);
  });
  return auto;
}

function renderWeek(){
  const el=document.getElementById('pg-week');
  const meta=loadWeekMeta(currentWeekStart);
  const weekEnd=addDays(currentWeekStart,4);

  const hasSchedule=meta.plannedVisits&&Object.keys(meta.plannedVisits).length;

  let h='';

  h+='<div class="week-nav"><button class="btn btn-sm btn-secondary" id="week-prev">&lsaquo;</button>';

  h+='<button class="btn btn-sm btn-secondary" id="week-next">&rsaquo;</button></div>';

  // Fiscal month context
  const midWeek=fmtDateISO(addDays(currentWeekStart,2));

  if(fp){

    const pct=Math.round((bizUsed/bizTotal)*100);
    h+='<div style="font-size:11px;color:#999;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">';
    h+='<span style="color:#cc6633;font-weight:600">'+esc(fp.name)+'</span>';
    h+='<span>Day '+bizUsed+' of '+bizTotal+' ('+bizLeft+' biz days left)</span></div>';
    h+='<div style="height:3px;background:#3a3a3a;border-radius:2px;margin-bottom:10px"><div style="height:100%;width:'+pct+'%;background:#cc6633;border-radius:2px"></div></div>';
  }

  // === PROMPT SECTION (main event) ===
  h+='<div class="prompt-section"><h4>SCHEDULE GENERATOR</h4>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  h+='<button class="btn btn-primary btn-sm" id="gen-prompt" style="flex:1">GENERATE & COPY PROMPT</button>';
  h+='<button class="btn btn-secondary btn-sm" id="preview-prompt">PREVIEW</button></div>';
  h+='<div id="prompt-preview-area" style="display:none"></div>';

// ========== ITINERARY (clean week-at-a-glance after schedule pasted) ==========
function renderItinerary(meta){
  let h='<div class="itin-card"><h4>YOUR WEEK</h4>';
  for(let i=0;i<5;i++){
    const ds=fmtDateISO(addDays(currentWeekStart,i));
    const planned=(meta.plannedVisits&&meta.plannedVisits[ds])||[];
    const isWFH=meta.wfhDays.includes(ds);
    const blocked=S.upcoming.some(u=>ds>=u.start&&ds<=u.end);
    const evts=(meta.dayEvents&&meta.dayEvents[ds])||[];

    h+='<div class="itin-day"><div class="itin-day-name">'+DAYNAMES[i].slice(0,3)+'</div><div class="itin-day-content">';

    if(blocked){
      h+='<span class="badge badge-grey">BLOCKED</span>';
    } else if(isWFH&&!planned.length){
      h+='<span style="color:#3498db;font-weight:600">WFH</span>';
      const remoteTasks=S.tasks.filter(t=>t.status==='open'&&t.taskMode!=='onsite'&&t.dueDate===ds);
      remoteTasks.forEach(t=>{const tm=TASK_MODES.find(m=>m.id===t.taskMode)||TASK_MODES[3];h+='<div class="itin-task"><span class="badge badge-p'+t.priority+'" style="font-size:9px;padding:1px 4px">P'+t.priority+'</span> '+tm.icon+' '+esc(t.title)+'</div>'});
    } else if(planned.length){
      planned.forEach((sid,si)=>{
        const shop=S.shops.find(s=>s.id===sid);if(!shop)return;
        h+='<div class="itin-shop-block"><div class="itin-shop-header">';
        if(planned.length>1)h+='<span class="itin-shop-num">'+(si+1)+'.</span>';
        h+='<span class="itin-shop-name">'+esc(shop.name)+'</span><span class="itin-drive">~'+shop.driveMin+' min</span></div>';
        const tasks=S.tasks.filter(t=>t.status==='open'&&t.shopId===sid&&t.taskMode==='onsite').sort((a,b)=>a.priority-b.priority);
        tasks.forEach(t=>{h+='<div class="itin-task"><span class="badge badge-p'+t.priority+'" style="font-size:9px;padding:1px 4px">P'+t.priority+'</span> '+esc(t.title)+'</div>'});
        h+='</div>';
      });
    } else {
      h+='<span style="color:#555;font-size:12px">—</span>';
    }

    evts.forEach(ev=>{h+='<div class="itin-event">'+esc(ev.title)+(ev.timing?' ('+esc(ev.timing)+')':'')+'</div>'});
    h+='</div></div>';
  }
  // Drive time budget
  let totalDrive=0,shopSet=new Set();
  Object.values(meta.plannedVisits||{}).forEach(sids=>{sids.forEach(sid=>{
    const shop=S.shops.find(s=>s.id===sid);if(shop){totalDrive+=shop.driveMin*2;shopSet.add(sid)}
  })});
  if(totalDrive){
    const hrs=Math.floor(totalDrive/60),mins=totalDrive%60;
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#999;padding:6px 0;border-top:1px solid #3a3a3a;margin-top:4px">';
    h+='<span>'+shopSet.size+' shops this week</span>';
    h+='<span style="color:#cc6633;font-weight:600">~'+hrs+'h'+(mins?mins+'m':'')+' total drive (round-trip)</span></div>';
  }
  h+='</div>';
  return h;
}

// ========== UNLOGGED VISITS ALERT ==========
function renderUnloggedAlert(meta){
  if(!meta.plannedVisits)return '';
  const today=todayISO();
  const unlogged=[];
  Object.entries(meta.plannedVisits).forEach(([ds,shopIds])=>{
    if(ds>=today)return;
    shopIds.forEach(sid=>{
      const hasVisit=S.visits.some(v=>v.shopId===sid&&v.date===ds);
      if(!hasVisit){const shop=S.shops.find(s=>s.id===sid);unlogged.push({ds,sid,name:shop?shop.name:'?'})}
    });
  });
  if(!unlogged.length)return '';
  let h='<div class="unlogged-alert"><h4>UNLOGGED VISITS</h4>';
  h+='<div style="font-size:11px;color:#f39c12;margin-bottom:6px">Scheduled visits not yet logged:</div>';
  unlogged.forEach(u=>{
    h+='<div class="ev-row" style="padding:3px 0"><span style="font-size:12px">'+fmtDate(u.ds)+' — '+esc(u.name)+'</span>';
    h+='<button class="btn btn-sm btn-primary quick-log-btn" data-sid="'+esc(u.sid)+'" data-date="'+esc(u.ds)+'" style="padding:3px 8px;font-size:10px">LOG</button></div>';
  });
  h+='</div>';
  return h;
}

function parseScheduleText(text){
  const dp=[{keys:['m-','m -','mon-','mon -'],idx:0},{keys:['tu-','tu -','tue-','tue -','tues-','tues -'],idx:1},{keys:['w-','w -','wed-','wed -'],idx:2},{keys:['th-','th -','thu-','thu -','thur-','thur -','thurs-','thurs -'],idx:3},{keys:['f-','f -','fri-','fri -'],idx:4}];
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);const planned={};const wfhDays=[];let matched=0;
  lines.forEach(line=>{const lower=line.toLowerCase();let dayIdx=-1,rest=line;
    for(const d of dp){for(const k of d.keys){if(lower.startsWith(k)){dayIdx=d.idx;rest=line.slice(k.length).trim();break}}if(dayIdx>=0)break}
    if(dayIdx<0)return;matched++;const dateStr=fmtDateISO(addDays(currentWeekStart,dayIdx));const rl=rest.toLowerCase();
    if(rl==='wfh'||rl.startsWith('wfh/')||rl.startsWith('wfh (')||rl==='work from home'||rl==='home'||rl==='off'){wfhDays.push(dateStr);return}
    const parts=rest.split(/\s*[\/,+&]\s*/).map(p=>p.trim()).filter(p=>p);const shopIds=[];
    parts.forEach(part=>{const pl=part.toLowerCase();if(pl==='wfh')return;let best=null,bs=0;
      S.shops.forEach(s=>{const sl=s.name.toLowerCase();if(sl===pl){best=s;bs=100}else if(sl.startsWith(pl)&&pl.length>2&&bs<90){best=s;bs=90}else if(pl.startsWith(sl)&&sl.length>2&&bs<80){best=s;bs=80}else if(sl.includes(pl)&&pl.length>3&&bs<70){best=s;bs=70}else if(pl.includes(sl)&&sl.length>3&&bs<60){best=s;bs=60}else{const sw=sl.split(/\s+/),pw=pl.split(/\s+/);for(const a of sw){if(a.length<=2)continue;for(const b of pw){if(b.length<=2)continue;if(a===b&&bs<50){best=s;bs=50}}}}});
      if(best&&!shopIds.includes(best.id))shopIds.push(best.id)});
    if(shopIds.length)planned[dateStr]=shopIds});
  if(matched<2)return null;return{planned,wfhDays};
}

// ========== PROMPT BUILDER (includes tasks) ==========
function buildPrompt(){
  const meta=loadWeekMeta(currentWeekStart),weekEnd=addDays(currentWeekStart,4),autoShops=getAutoShopsForWeek();
  let p='Plan a Mon-Fri work week for a regional manager who visits auto body shops across MD, VA, and WV from a home base in Canton, Baltimore. Monthly visit targets vary by shop. Prioritize shops behind their target, then those most overdue, while grouping shops by geography to minimize total drive time.\n\n';
  const aC=S.constraints.filter(c=>c.on);if(aC.length){p+='CONSTRAINTS:\n';aC.forEach(c=>{p+='- '+c.text+'\n'});p+='\n'}
  const aR=S.routing.filter(r=>r.on);if(aR.length){p+='ROUTING RULES:\n';aR.forEach(r=>{p+='- '+r.text+'\n'});p+='\n'}
  const aT=S.traffic.filter(t=>t.on);if(aT.length){p+='TRAFFIC RULES:\n';aT.forEach(t=>{p+='- '+t.text+'\n'});p+='\n'}
  const now=todayISO();
  p+='SHOP STATUS:\n';
  const cadenceWarnings=[];
  S.shops.forEach(s=>{const st=shopStatus(s);const dt=st.daysAgo===null?'NEVER':''+st.daysAgo+'d ago';
    // Count visits this fiscal month
    const cfp=getFiscalMonth(now);
    const fmVisits=cfp?S.visits.filter(v=>v.shopId===s.id&&v.date>=cfp.start&&v.date<=cfp.end).length:0;
    const target=parseInt((s.freq||'1').match(/(\d+)/)?.[1])||1;
    const mt=fmVisits>=target?'on track ('+fmVisits+'/'+target+')':'BEHIND ('+fmVisits+'/'+target+')';
    if(fmVisits<target){const bl=cfp?fiscalBizDaysLeft(now):null;cadenceWarnings.push(s.name+' needs '+target+'x/month, at '+fmVisits+(bl?' with '+bl+' biz days left':''))}
    p+='- '+s.name+' ('+s.location+', ~'+s.driveMin+' min, target: '+(s.freq||'1x/month')+'): '+dt+' ['+mt+']\n'});p+='\n';
  if(cadenceWarnings.length){p+='CADENCE WARNINGS — shops behind target this fiscal month:\n';cadenceWarnings.forEach(w=>{p+='- '+w+'\n'});p+='\n'}

  const onsite=S.tasks.filter(t=>t.status==='open'&&t.taskMode==='onsite'&&t.shopId!=='regional');
  if(onsite.length){
    const byShop={};onsite.forEach(t=>{if(!byShop[t.shopId])byShop[t.shopId]=[];byShop[t.shopId].push(t)});
    p+='OPEN TASKS REQUIRING ON-SITE VISITS:\n';
    Object.entries(byShop).forEach(([sid,tasks])=>{
      const shop=S.shops.find(s=>s.id===sid);
      const items=tasks.sort((a,b)=>a.priority-b.priority).map(t=>{let s=t.title+' (P'+t.priority;if(t.dueDate)s+=', due '+t.dueDate;const m=t.estMins||(t.estHours?Math.round(t.estHours*60):0);if(m)s+=', ~'+m+'min';s+=')';return s});
      p+='- '+(shop?shop.name:'?')+': '+items.join('; ')+'\n'});p+='\n';
  }
  const remote=S.tasks.filter(t=>t.status==='open'&&t.taskMode!=='onsite'&&t.shopId!=='regional');
  if(remote.length){
    p+='REMOTE TASKS (calls, emails, desk work) — can be done from anywhere:\n';
    remote.sort((a,b)=>a.priority-b.priority).forEach(t=>{const tm=TASK_MODES.find(m=>m.id===t.taskMode);const shop=S.shops.find(s=>s.id===t.shopId);let s='- '+(tm?tm.icon+' ':'')+t.title+(shop?' ('+shop.name+')':'')+' P'+t.priority;if(t.dueDate)s+=', due '+t.dueDate;s+='\n';p+=s});p+='\n';
  }

  p+='WEEK: '+fmtDateISO(currentWeekStart)+' to '+fmtDateISO(weekEnd)+'\n';
  const pfp=getFiscalMonth(fmtDateISO(addDays(currentWeekStart,2)));
  if(pfp){const bl=fiscalBizDaysLeft(fmtDateISO(addDays(currentWeekStart,2)));p+='Fiscal month: '+pfp.name+' ('+bl+' business days remaining)\n';
    // Check if this week overlaps fiscal month end
    const fpEnd=new Date(pfp.end+'T00:00:00'),wkStart=new Date(fmtDateISO(currentWeekStart)+'T00:00:00'),wkEnd=new Date(fmtDateISO(weekEnd)+'T00:00:00');
    if(fpEnd>=wkStart&&fpEnd<=wkEnd)p+='⚠ FISCAL MONTH-END THIS WEEK — keep travel lighter for flexibility and extra time needed for file closure. Try to keep Friday as WFH/flex if possible.\n'}
  const weekHolidays=[];for(let i=0;i<5;i++){const hd=isHoliday(fmtDateISO(addDays(currentWeekStart,i)));if(hd)weekHolidays.push(DAYNAMES[i]+': '+hd.name)}
  if(weekHolidays.length)p+='Holidays this week: '+weekHolidays.join(', ')+' — treat as BLOCKED (office closed, no visits)\n';
  if(meta.wfhDays.length)p+='WFH days: '+meta.wfhDays.map(d=>fmtDate(d)).join(', ')+'\n';

  // Derive must-visit shops from dayReqs + auto-detected
  const allNeeded=new Map();
  for(let i=0;i<5;i++){const ds=fmtDateISO(addDays(currentWeekStart,i));
    const reqs=(meta.dayReqs&&meta.dayReqs[ds])||[];
    reqs.forEach(r=>{if(!allNeeded.has(r.shopId))allNeeded.set(r.shopId,r.timing||'anytime')});
  }
  autoShops.forEach(sid=>{if(!allNeeded.has(sid))allNeeded.set(sid,'auto — has P1 or due tasks')});
  if(allNeeded.size){
    const items=[];allNeeded.forEach((note,sid)=>{const s=S.shops.find(sh=>sh.id===sid);items.push((s?s.name:'?')+(note&&note!=='anytime'?' ('+note+')':''))});
    p+='Must visit this week: '+items.join(', ')+'\n';
    p+='Timing key — AM: ~9:30am-11:30am, PM: ~12:30pm-3:00pm, most of day: ~9:30am-3:00pm, full day: ~8:00am-5:00pm.\n';
  }

  for(let i=0;i<5;i++){
    const ds=fmtDateISO(addDays(currentWeekStart,i));
    const reqs=(meta.dayReqs&&meta.dayReqs[ds])||[],evts=(meta.dayEvents&&meta.dayEvents[ds])||[];
    const blocked=S.upcoming.some(u=>ds>=u.start&&ds<=u.end);const hol=isHoliday(ds);const parts=[];
    if(hol)parts.push('BLOCKED — '+hol.name+' (office closed)');
    else if(blocked)parts.push('BLOCKED');
    reqs.forEach(r=>{const sh=S.shops.find(s=>s.id===r.shopId);if(sh)parts.push('must visit '+sh.name+(r.timing?' ('+r.timing+')':''))});
    evts.forEach(ev=>parts.push(ev.title+(ev.timing?' ('+ev.timing+')':'')));
    if(parts.length)p+=DAYNAMES[i]+': '+parts.join('; ')+'\n';
  }
  p+='\nGenerate 3 schedule options. For each: departure time, shops with arrival/leave times, partner covers dropoff/pickup. Track partner covers (dropoff or pickup each count as 1) — show a running total per option. Also show estimated total drive time for the week at the end of each option.\n\nIf a dev check-in task exists for an employee at a shop being visited that day, note it as a task to handle during that visit.\n\nNo addresses or drive breakdowns.\n\nAfter each option, boss format:\nM- location\nTu- location\nW- location\nTh- location\nF- location';
  return p;
}

function renderPerfScorecard(){
  let h='';

  if(curFP){
    const bizLeft=fiscalBizDaysLeft(todayISO()),bizTotal=fiscalBizDaysTotal(curFP),bizUsed=bizTotal-bizLeft;
    const pct=Math.round((bizUsed/bizTotal)*100);
    h+='<div class="digest-section" style="border:1px solid #cc6633"><h4 style="color:#cc6633">MONTHLY SCORECARD — '+esc(curFP.name)+'</h4>';
    h+='<div style="font-size:11px;color:#999;margin-bottom:6px">Day '+bizUsed+' of '+bizTotal+' ('+bizLeft+' remaining)</div>';
    h+='<div style="height:3px;background:#3a3a3a;border-radius:2px;margin-bottom:10px"><div style="height:100%;width:'+pct+'%;background:#cc6633;border-radius:2px"></div></div>';

    let onTrack=0,behind=0;
    S.shops.forEach(s=>{
      const fmVisits=S.visits.filter(v=>v.shopId===s.id&&v.date>=curFP.start&&v.date<=curFP.end).length;
      const target=parseInt((s.freq||'1').match(/(\d+)/)?.[1])||1;
      if(fmVisits>=target)onTrack++;else behind++;

    const tasksCompletedThisMonth=S.tasks.filter(t=>t.status==='done'&&t.completedDate>=curFP.start&&t.completedDate<=curFP.end).length;
    const tasksCreatedThisMonth=S.tasks.filter(t=>t.createdDate>=curFP.start&&t.createdDate<=curFP.end).length;

    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">';

    h+='<div class="perf-stat"><div class="val" style="color:#e74c3c">'+behind+'</div><div class="lbl">Behind</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#3498db">'+tasksCompletedThisMonth+'</div><div class="lbl">Done</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#f39c12">'+tasksCreatedThisMonth+'</div><div class="lbl">Created</div></div></div>';

    h+='<div style="font-size:11px;color:#888;margin-bottom:4px">SHOP VISIT CADENCE</div>';
    S.shops.forEach(s=>{
      const fmVisits=S.visits.filter(v=>v.shopId===s.id&&v.date>=curFP.start&&v.date<=curFP.end).length;
      const target=parseInt((s.freq||'1').match(/(\d+)/)?.[1])||1;
      const ok=fmVisits>=target;
      h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #3a3a3a">';
      h+='<span>'+esc(s.name)+'</span><span style="color:'+(ok?'#2ecc71':'#e74c3c')+'">'+fmVisits+'/'+target+'</span></div>';
    });
    h+='</div>';
  } else {
    h+='<p style="color:#888;text-align:center;padding:20px">No active fiscal period for today.</p>';
  }
  return h;
}

  const now=todayISO(),mon=getMonday(new Date()),monISO=fmtDateISO(mon),sunISO=fmtDateISO(addDays(mon,6));
  const open=S.tasks.filter(t=>t.status==='open'),done=S.tasks.filter(t=>t.status==='done'),delegated=S.tasks.filter(t=>t.status==='delegated');

  const doneWeek=done.filter(t=>t.completedDate>=monISO&&t.completedDate<=sunISO);
  const aging=open.filter(t=>t.createdDate&&daysBetween(t.createdDate,now)>=14);

  let h='<div class="task-stats-grid" style="grid-template-columns:repeat(4,1fr)">';

  h+='<div class="task-stat"><div class="val" style="color:#9b59b6">'+delegated.length+'</div><div class="lbl">Delegated</div></div></div>';

  h+='<div class="task-stats-grid" style="grid-template-columns:repeat(3,1fr)">';
  h+='<div class="task-stat"><div class="val" style="color:#2ecc71">'+doneWeek.length+'</div><div class="lbl">Done This Week</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#e67e22">'+aging.length+'</div><div class="lbl">Aging 14d+</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#f39c12">'+open.reduce((s,t)=>s+(t.estMins||(t.estHours?Math.round(t.estHours*60):0)),0)+'m</div><div class="lbl">Est. Open Mins</div></div></div>';

function empProgress(emp){
  if(!emp.milestones||!emp.milestones.length)return 0;
  const done=emp.milestones.filter(m=>m.done).length;
  return Math.round((done/emp.milestones.length)*100);
}

function empNextCheckin(emp){
  if(!emp.checkins||!emp.checkins.length)return null;
  const last=emp.checkins.sort((a,b)=>b.date.localeCompare(a.date))[0].date;
  const d=new Date(last+'T00:00:00');
  const cadenceDays=emp.checkinCadence==='weekly'?7:emp.checkinCadence==='monthly'?30:14;
  d.setDate(d.getDate()+cadenceDays);
  return fmtDateISO(d);
}

function empCheckinStatus(emp){
  const next=empNextCheckin(emp);
  if(!next)return emp.checkins&&emp.checkins.length?'ok':'none';
  const today=todayISO();
  if(next<=today)return'overdue';
  const diff=daysBetween(today,next);
  if(diff<=3)return'soon';
  return'ok';
}

function sortEmployees(emps){
  const sorted=[...emps];
  if(devSort==='name')sorted.sort((a,b)=>a.name.localeCompare(b.name));
  else if(devSort==='shop')sorted.sort((a,b)=>{const sa=S.shops.find(s=>s.id===a.shopId),sb=S.shops.find(s=>s.id===b.shopId);return(sa?sa.name:'ZZZ').localeCompare(sb?sb.name:'ZZZ')});
  else if(devSort==='role')sorted.sort((a,b)=>(a.currentRole||'').localeCompare(b.currentRole||''));
  else if(devSort==='checkin')sorted.sort((a,b)=>{const la=a.checkins&&a.checkins.length?[...a.checkins].sort((x,y)=>y.date.localeCompare(x.date))[0].date:'';const lb=b.checkins&&b.checkins.length?[...b.checkins].sort((x,y)=>y.date.localeCompare(x.date))[0].date:'';return la.localeCompare(lb)});
  return sorted;
}

function renderDevCheckins(){
  let h='';
  // Due / overdue check-ins
  const due=[];const upcoming=[];
  S.employees.forEach(emp=>{
    const status=empCheckinStatus(emp);
    const next=empNextCheckin(emp);
    const shop=S.shops.find(s=>s.id===emp.shopId);
    if(status==='overdue')due.push({emp,next,shop,status});
    else if(status==='soon')upcoming.push({emp,next,shop,status});
    else if(status==='none')due.push({emp,next:null,shop,status:'none'});
  });

  if(due.length){
    h+='<div style="margin-bottom:12px"><h4 style="font-size:12px;color:#e74c3c;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">OVERDUE / NEEDS CHECK-IN</h4>';

      h+='<span><strong>'+esc(d.emp.name)+'</strong> — '+(d.shop?esc(d.shop.name):'Regional');

      h+='<button class="btn btn-sm btn-primary dev-quick-ci" data-eid="'+esc(d.emp.id)+'">Check In</button></div>';
    });

    h+='<div style="margin-bottom:12px"><h4 style="font-size:12px;color:#f39c12;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">COMING UP</h4>';
    upcoming.forEach(d=>{
      h+='<div class="checkin-due" style="background:#2a2a20;border-color:#888;color:#999">';
      h+='<span><strong>'+esc(d.emp.name)+'</strong> — due '+fmtDate(d.next)+'</span>';
      h+='<button class="btn btn-sm btn-secondary dev-quick-ci" data-eid="'+esc(d.emp.id)+'">Check In</button></div>';
    });
    h+='</div>';
  }

  // Full check-in history
  h+='<h4 style="font-size:12px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">ALL CHECK-IN HISTORY</h4>';
  const allCI=[];
  S.employees.forEach(emp=>{(emp.checkins||[]).forEach(ci=>{allCI.push({emp,ci})})});
  allCI.sort((a,b)=>b.ci.date.localeCompare(a.ci.date));
  if(!allCI.length){h+='<p style="color:#888;text-align:center;padding:20px">No check-ins logged yet.</p>';}
  else{allCI.slice(0,30).forEach(({emp,ci})=>{
    const shop=S.shops.find(s=>s.id===emp.shopId);
    h+='<div class="checkin-item" style="margin-bottom:8px">';
    h+='<div class="ci-date">'+fmtDate(ci.date)+' — <strong>'+esc(emp.name)+'</strong>'+(shop?' ('+esc(shop.name)+')':'')+'</div>';
    h+='<div class="ci-note">'+esc(ci.note)+'</div></div>';
  });}
  if(!S.employees.length)h='<p style="color:#888;text-align:center;padding:30px">Add employees in the Roster tab first.</p>';
  return h;
}

function wireDevPrompt(el){
  document.getElementById('dev-gen-prompt')?.addEventListener('click',()=>{
    const eid=document.getElementById('dev-prompt-emp').value;
    if(!eid){toast('Select an employee',true);return}
    const emp=S.employees.find(e=>e.id===eid);
    if(!emp)return;
    const shop=S.shops.find(s=>s.id===emp.shopId);
    let p='EMPLOYEE PROFILE:\n';
    p+='Name: '+emp.name+'\n';
    p+='Shop: '+(shop?shop.name:'Regional')+'\n';
    p+='Current Role: '+(emp.currentRole||'Not specified')+'\n';
    if(emp.targetRole)p+='Target Role: '+emp.targetRole+'\n';
    p+='Check-in Cadence: '+(emp.checkinCadence||'biweekly')+'\n\n';
    if(emp.strengths)p+='STRENGTHS:\n'+emp.strengths+'\n\n';
    if(emp.opportunities)p+='AREAS OF OPPORTUNITY:\n'+emp.opportunities+'\n\n';
    if(emp.milestones&&emp.milestones.length){
      p+='EXISTING MILESTONES:\n';
      emp.milestones.forEach(ms=>{p+='- ['+(ms.done?'x':' ')+'] '+ms.text+(ms.targetDate?' (target: '+ms.targetDate+')':'')+'\n'});
      p+='\n';
    }
    if(emp.checkins&&emp.checkins.length){
      const recent=emp.checkins.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
      p+='RECENT CHECK-IN NOTES:\n';
      recent.forEach(ci=>{p+='['+ci.date+'] '+ci.note+'\n'});
      p+='\n';
    }
    if(emp.devPlan)p+='CURRENT PLAN/NOTES:\n'+emp.devPlan+'\n\n';
    p+='INSTRUCTIONS:\n';
    p+='Create a structured development plan. Do NOT repeat the employee info back — start directly with the plan sections.\n\n';
    p+='Include these sections separated by ---:\n';
    p+='1. **Milestones** — 3-5 specific, measurable milestones with target timeframes (numbered, bold title)\n';
    p+='2. **Next Check-In Topics** — suggested topics for the next 3 check-in conversations\n';
    p+='3. **Resources and Training** — recommendations if applicable\n';
    p+='4. **Behaviors to Observe** — key behaviors to reinforce and watch for\n';
    if(emp.targetRole)p+='5. **Steps to Prepare for '+emp.targetRole+'** — specific actions to prepare them\n';
    p+='\nKeep the tone practical — this is for a busy regional manager, not an HR document. Focus on what I can realistically do during shop visits and check-ins.';

    const out=document.getElementById('dev-prompt-output');
    out.innerHTML='<div class="prompt-box"><textarea id="dev-prompt-text" style="min-height:200px;font-size:12px;font-family:monospace">'+esc(p)+'</textarea></div>'
      +'<button class="btn btn-primary btn-block" id="dev-copy-prompt">COPY TO CLIPBOARD</button>';
    document.getElementById('dev-copy-prompt').addEventListener('click',()=>{
      const ta=document.getElementById('dev-prompt-text');ta.select();document.execCommand('copy');toast('Copied!');
    });
  });
  // Paste plan parser
  document.getElementById('dev-parse-plan')?.addEventListener('click',()=>{
    const eid=document.getElementById('dev-paste-emp').value;
    if(!eid){toast('Select an employee',true);return}
    const emp=S.employees.find(e=>e.id===eid);
    if(!emp)return;
    const raw=document.getElementById('dev-paste-text').value.trim();
    if(!raw){toast('Paste the AI response first',true);return}
    // Extract milestones: only from the **Milestones** section
    const extracted=[];
    const msSection=raw.match(/\*\*Milestones?\*\*[\s\S]*?(?=\n---|\n\*\*(?:Next|Resources|Behaviors|Steps|Check.?In))/i);
    if(msSection){
      const msRegex=/^\s*(\d+)\.\s+\*\*(.+?)\*\*/gm;let match;
      while((match=msRegex.exec(msSection[0]))!==null){
        let title=match[2].trim();
        title=title.replace(/\s*—\s*$/,'').replace(/\*+$/,'').trim();
        if(title.length>3&&title.length<200)extracted.push(title);
      }
    }
    // Deduplicate against existing milestones
    const existing=new Set((emp.milestones||[]).map(m=>m.text.toLowerCase()));
    const newMS=extracted.filter(t=>!existing.has(t.toLowerCase()));
    // Show confirmation
    const out=document.getElementById('dev-parse-output');
    let oh='<div style="background:#252525;border-radius:8px;padding:12px;margin-top:8px">';
    oh+='<div style="font-size:12px;color:#2ecc71;font-weight:600;margin-bottom:8px">FOUND '+extracted.length+' MILESTONES'+(newMS.length<extracted.length?' ('+newMS.length+' new)':'')+'</div>';
    newMS.forEach((ms,i)=>{
      oh+='<label style="display:flex;align-items:flex-start;gap:8px;margin:4px 0;font-size:12px;color:#d0d0d0"><input type="checkbox" checked class="parse-ms-cb" data-idx="'+i+'" style="width:auto;margin-top:2px;accent-color:#2ecc71">'+esc(ms)+'</label>';
    });
    if(!newMS.length)oh+='<div style="font-size:12px;color:#888">All milestones already exist.</div>';
    oh+='<div style="margin-top:8px;font-size:11px;color:#888">Full response will be saved to Development Plan notes.</div>';
    oh+='<button class="btn btn-block" id="dev-confirm-import" style="margin-top:8px;background:#1e3528;color:#2ecc71;border:1px solid #2ecc71;font-weight:600">CONFIRM IMPORT</button></div>';
    out.innerHTML=oh;
    document.getElementById('dev-confirm-import').addEventListener('click',()=>{
      // Add checked milestones
      const cbs=out.querySelectorAll('.parse-ms-cb');
      cbs.forEach(cb=>{
        if(cb.checked){
          const ms=newMS[parseInt(cb.dataset.idx)];
          if(ms)emp.milestones.push({text:ms,targetDate:'',done:false,completedDate:'',createdDate:todayISO()});
        }
      });
      // Append full response to devPlan
      emp.devPlan=(emp.devPlan?emp.devPlan+'\n\n---\n\n':'')+raw;
      save();toast('Plan imported — '+emp.milestones.length+' milestones total');renderDev();
    });
  });
}

const TASK_CATEGORIES=['staffing','facility','ops','parts','insurance','financial','personal'];

function getFilteredTasks(status){let t=S.tasks.filter(x=>x.status===status);if(taskFilterShop)t=t.filter(x=>x.shopId===taskFilterShop);if(taskFilterCat)t=t.filter(x=>x.category===taskFilterCat);if(taskFilterPri)t=t.filter(x=>x.priority===parseInt(taskFilterPri));return t}
function sortTasks(tasks){const now=todayISO();return tasks.sort((a,b)=>{if(taskSort==='priority'){if(a.priority!==b.priority)return a.priority-b.priority;const ao=a.dueDate&&a.dueDate<now?0:1,bo=b.dueDate&&b.dueDate<now?0:1;if(ao!==bo)return ao-bo;if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);if(a.dueDate)return -1;if(b.dueDate)return 1;return 0}if(taskSort==='due'){if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);if(a.dueDate)return -1;if(b.dueDate)return 1;return a.priority-b.priority}if(taskSort==='created')return b.createdDate.localeCompare(a.createdDate);if(taskSort==='shop'){const an=S.shops.find(s=>s.id===a.shopId),bn=S.shops.find(s=>s.id===b.shopId);const aN=an?an.name:'ZZZ',bN=bn?bn.name:'ZZZ';if(aN!==bN)return aN.localeCompare(bN);return a.priority-b.priority}return 0})}

function renderTasksActive(){
  const now=todayISO();
  let h='<button class="btn btn-primary btn-block" id="add-task-btn" style="margin-bottom:6px;padding:6px;font-size:12px">+ ADD TASK</button>';

  S.shops.forEach(s=>{h+='<option value="'+esc(s.id)+'"'+(taskFilterShop===s.id?' selected':'')+'>'+esc(s.name)+'</option>'});
  h+='</select><select id="task-f-cat"><option value="">All Categories</option>';
  TASK_CATEGORIES.forEach(c=>{h+='<option value="'+esc(c)+'"'+(taskFilterCat===c?' selected':'')+'>'+esc(c)+'</option>'});
  h+='</select><select id="task-f-pri"><option value="">All</option><option value="1"'+(taskFilterPri==='1'?' selected':'')+'>P1</option><option value="2"'+(taskFilterPri==='2'?' selected':'')+'>P2</option><option value="3"'+(taskFilterPri==='3'?' selected':'')+'>P3</option></select>';
  h+='<select id="task-sort"><option value="priority"'+(taskSort==='priority'?' selected':'')+'>Priority</option><option value="due"'+(taskSort==='due'?' selected':'')+'>Due</option><option value="created"'+(taskSort==='created'?' selected':'')+'>Newest</option><option value="shop"'+(taskSort==='shop'?' selected':'')+'>Shop</option></select></div>';
  const tasks=sortTasks(getFilteredTasks('open'));
  h+=renderVisitPrep();
  const showP1=taskFilterPri!=='2'&&taskFilterPri!=='3',showReg=!taskFilterShop||taskFilterShop==='regional';
  const p1=showP1?tasks.filter(t=>t.priority===1):[],reg=showReg?tasks.filter(t=>t.shopId==='regional'&&t.priority!==1):[];
  if(p1.length||reg.length){h+='<div class="top-panels">';if(p1.length){h+='<div class="priority-panel"><h4>P1 — Immediate</h4>';p1.forEach(t=>{h+=renderTaskItem(t,now)});h+='</div>'}if(reg.length){h+='<div class="regional-panel"><h4>Regional / Personal</h4>';reg.forEach(t=>{h+=renderTaskItem(t,now)});h+='</div>'}h+='</div>'}
  const shown=new Set();if(!taskFilterPri||taskFilterPri==='1')tasks.filter(t=>t.priority===1).forEach(t=>shown.add(t.id));if(!taskFilterShop||taskFilterShop==='regional')tasks.filter(t=>t.shopId==='regional').forEach(t=>shown.add(t.id));
  const rest=tasks.filter(t=>!shown.has(t.id));
  if(!rest.length&&!tasks.length)h+='<p style="color:#888;text-align:center;padding:30px">No active tasks.</p>';
  const p2=rest.filter(t=>t.priority===2),p3=rest.filter(t=>t.priority===3),pOther=rest.filter(t=>t.priority!==2&&t.priority!==3);
  if(p2.length){h+='<div class="p2-panel"><h4>P2 — This Week</h4>';p2.forEach(t=>{h+=renderTaskItem(t,now)});h+='</div>'}
  if(p3.length){h+='<div class="p3-panel"><h4>P3 — When Possible</h4>';p3.forEach(t=>{h+=renderTaskItem(t,now)});h+='</div>'}
  pOther.forEach(t=>{h+=renderTaskItem(t,now)});return h;
}

function renderTaskItem(t,now){
  const shop=t.shopId==='regional'?{name:'Regional'}:S.shops.find(s=>s.id===t.shopId);
  const isDone=t.status==='done',isOver=t.dueDate&&t.dueDate<now&&!isDone,du=t.dueDate?daysBetween(now,t.dueDate):null;
  const age=t.createdDate?daysBetween(t.createdDate,now):0,isAging=!isDone&&age>=14;
  let pill='';if(t.dueDate&&!isDone){if(du<0)pill='<span class="task-due-pill overdue">'+Math.abs(du)+'d over</span>';else if(du===0)pill='<span class="task-due-pill soon">today</span>';else if(du<=3)pill='<span class="task-due-pill soon">'+du+'d</span>';else pill='<span class="task-due-pill normal">'+fmtDate(t.dueDate)+'</span>'}
  let h='<div class="task-item p'+t.priority+(isDone?' done':'')+(isOver?' overdue-glow':'')+'" onclick="this.classList.toggle(\'expanded\')">';
  h+='<div class="task-row"><span class="task-title">'+esc(t.title)+'</span>';
  if(isAging)h+='<span class="badge badge-aging" style="font-size:8px;padding:0 3px">'+age+'d</span>';
  if(pill)h+=pill;h+='</div>';
  h+='<div class="task-detail"><div class="task-meta"><span class="badge badge-cat">'+esc(t.category)+'</span><span>'+esc(shop?shop.name:'?')+'</span>';
  if(t.assignedTo)h+='<span class="badge badge-delegated">'+esc(t.assignedTo)+'</span>';
  if(t.taskMode&&t.taskMode!=='onsite'){const tm=TASK_MODES.find(m=>m.id===t.taskMode);if(tm)h+='<span class="badge" style="background:#2a2a35;color:#888">'+tm.icon+' '+tm.label+'</span>';}
  if(t.dueDate)h+='<span>'+fmtDate(t.dueDate)+'</span>';h+='</div>';
  if(t.notes)h+='<div style="font-size:11px;color:#999;margin-top:4px">'+esc(t.notes)+'</div>';
  if(isDone&&t.completionNote)h+='<div style="font-size:11px;color:#2ecc71;margin-top:4px;font-style:italic">Done: '+esc(t.completionNote)+'</div>';
  h+='<div class="task-actions">';
  if(isDone)h+='<button class="btn btn-sm btn-secondary task-reopen" data-id="'+esc(t.id)+'">REOPEN</button>';
  else if(t.status==='delegated')h+='<button class="btn btn-sm btn-primary task-complete" data-id="'+esc(t.id)+'">MARK DONE</button><button class="btn btn-sm btn-secondary task-reopen" data-id="'+esc(t.id)+'">RECLAIM</button>';
  else{h+='<button class="btn btn-sm btn-primary task-complete" data-id="'+esc(t.id)+'">DONE</button>';
  if(t.assignedTo)h+='<button class="btn btn-sm task-delegate" data-id="'+esc(t.id)+'" style="background:#2a2a35;color:#9b59b6">DELEGATE</button>';}
  h+='<button class="btn btn-sm btn-secondary task-edit" data-id="'+esc(t.id)+'">EDIT</button>';
  h+='<button class="btn btn-sm btn-danger task-del" data-id="'+esc(t.id)+'">✕</button></div></div></div>';return h;
}

function renderDelegated(){
  const now=todayISO();
  const delegated=S.tasks.filter(t=>t.status==='delegated').sort((a,b)=>{
    const ageA=a.createdDate?daysBetween(a.createdDate,now):0;const ageB=b.createdDate?daysBetween(b.createdDate,now):0;return ageB-ageA;
  });
  let h='<div style="font-size:12px;color:#888;margin-bottom:8px">Tasks you\'ve handed off — waiting on others</div>';
  if(!delegated.length)return h+'<p style="color:#666;font-size:13px">No delegated tasks. Set "Assigned To" on a task and hit DELEGATE.</p>';
  const byPerson={};delegated.forEach(t=>{const key=t.assignedTo||'Unassigned';if(!byPerson[key])byPerson[key]=[];byPerson[key].push(t)});

  return h;
}

function renderInsights(){
  const now=todayISO(),mon=getMonday(new Date()),monISO=fmtDateISO(mon),sunISO=fmtDateISO(addDays(mon,6));
  const nextMon=fmtDateISO(addDays(mon,7)),nextSun=fmtDateISO(addDays(mon,13));
  const open=S.tasks.filter(t=>t.status==='open'),done=S.tasks.filter(t=>t.status==='done');
  const overdue=open.filter(t=>t.dueDate&&t.dueDate<now);
  const doneWeek=done.filter(t=>t.completedDate>=monISO&&t.completedDate<=sunISO);
  const dueWeek=open.filter(t=>t.dueDate&&t.dueDate>=monISO&&t.dueDate<=sunISO);
  const dueNext=open.filter(t=>t.dueDate&&t.dueDate>=nextMon&&t.dueDate<=nextSun);
  const aging=open.filter(t=>t.createdDate&&daysBetween(t.createdDate,now)>=14);
  const delegated=S.tasks.filter(t=>t.status==='delegated');
  let h='<div class="task-stats-grid" style="grid-template-columns:repeat(4,1fr)">';
  h+='<div class="task-stat"><div class="val" style="color:#3498db">'+open.length+'</div><div class="lbl">Open</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#2ecc71">'+done.length+'</div><div class="lbl">Done</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#e74c3c">'+overdue.length+'</div><div class="lbl">Overdue</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#f39c12">'+open.reduce((s,t)=>s+(t.estMins||(t.estHours?Math.round(t.estHours*60):0)),0)+'m</div><div class="lbl">Est. Mins</div></div></div>';

  h+='<div class="digest-section"><h4 style="color:#2ecc71">Completed This Week ('+doneWeek.length+')</h4>';
  if(doneWeek.length){doneWeek.forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#888">'+esc(sh)+'</span></div>'})}else h+='<div style="font-size:12px;color:#888">None yet.</div>';
  h+='</div>';

  if(overdue.length){h+='<div class="digest-section" style="border-left:3px solid #e74c3c"><h4 style="color:#e74c3c">Overdue ('+overdue.length+')</h4>';
    overdue.sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#e74c3c">'+Math.abs(daysBetween(now,t.dueDate))+'d · '+esc(sh)+'</span></div>'});h+='</div>'}

  h+='<div class="digest-section"><h4 style="color:#f39c12">Due This Week ('+dueWeek.length+')</h4>';
  if(dueWeek.length){dueWeek.sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#888">'+fmtDate(t.dueDate)+' · '+esc(sh)+'</span></div>'})}else h+='<div style="font-size:12px;color:#888">Nothing due.</div>';
  h+='</div>';

  if(dueNext.length){h+='<div class="digest-section"><h4 style="color:#3498db">Next Week ('+dueNext.length+')</h4>';dueNext.sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#888">'+fmtDate(t.dueDate)+' · '+esc(sh)+'</span></div>'});h+='</div>'}
  if(aging.length){h+='<div class="digest-section" style="border-left:3px solid #e67e22"><h4 style="color:#e67e22">Aging 14+ Days ('+aging.length+')</h4>';aging.sort((a,b)=>daysBetween(b.createdDate,now)-daysBetween(a.createdDate,now)).forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#e67e22">'+daysBetween(t.createdDate,now)+'d · P'+t.priority+' · '+esc(sh)+'</span></div>'});h+='</div>'}
  if(delegated.length){h+='<div class="digest-section" style="border-left:3px solid #9b59b6"><h4 style="color:#9b59b6">Delegated ('+delegated.length+')</h4>';delegated.forEach(t=>{const sh=t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?';h+='<div class="digest-item insight-task" data-sid="'+esc(t.shopId)+'"><span>'+esc(t.title)+'</span><span style="color:#9b59b6">'+esc(t.assignedTo)+' · '+esc(sh)+'</span></div>'});h+='</div>'}

  h+='<h3 style="font-size:14px;margin:16px 0 8px">Open by Shop</h3>';
  const sc={};open.forEach(t=>{sc[t.shopId]=(sc[t.shopId]||0)+1});const ms=Math.max(...Object.values(sc),1);
  Object.entries(sc).sort((a,b)=>b[1]-a[1]).forEach(([sid,c])=>{const sh=sid==='regional'?{name:'Regional'}:S.shops.find(s=>s.id===sid);h+='<div style="margin-bottom:6px;cursor:pointer" class="insight-task" data-sid="'+esc(sid)+'"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(sh?sh.name:'?')+'</span><span>'+c+'</span></div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+Math.round(c/ms*100)+'%;background:#3498db"></div></div></div>'});

  h+='<h3 style="font-size:14px;margin:16px 0 8px">Open by Category</h3>';
  const cc={};open.forEach(t=>{cc[t.category]=(cc[t.category]||0)+1});const mc=Math.max(...Object.values(cc),1);
  Object.entries(cc).sort((a,b)=>b[1]-a[1]).forEach(([cat,c])=>{h+='<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(cat)+'</span><span>'+c+'</span></div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+Math.round(c/mc*100)+'%;background:#2ecc71"></div></div></div>'});

  // === HISTORICAL TRACKING ===
  h+='<h3 style="font-size:14px;margin:20px 0 8px;padding-top:12px;border-top:1px solid #444">History</h3>';

  // Weekly completion trend (last 8 weeks)
  const weeks=[];
  for(let w=7;w>=0;w--){
    const wMon=getMonday(addDays(new Date(),-w*7)),wSun=addDays(wMon,6);
    const wMonISO=fmtDateISO(wMon),wSunISO=fmtDateISO(wSun);
    const completed=done.filter(t=>t.completedDate>=wMonISO&&t.completedDate<=wSunISO).length;
    const created=S.tasks.filter(t=>t.createdDate>=wMonISO&&t.createdDate<=wSunISO).length;
    weeks.push({label:fmtDate(wMon).split(', ').pop(),completed,created,monISO:wMonISO});
  }
  const maxWk=Math.max(...weeks.map(w=>Math.max(w.completed,w.created)),1);
  h+='<div class="digest-section"><h4>Weekly Trend (last 8 weeks)</h4>';
  h+='<div style="display:flex;gap:2px;align-items:flex-end;height:80px;margin-bottom:8px">';
  weeks.forEach(w=>{
    const ch=Math.max(Math.round(w.completed/maxWk*70),2),crh=Math.max(Math.round(w.created/maxWk*70),2);
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">';
    h+='<div style="display:flex;gap:1px;align-items:flex-end;height:70px">';
    h+='<div style="width:8px;height:'+crh+'px;background:#3498db;border-radius:2px 2px 0 0" title="Created: '+w.created+'"></div>';
    h+='<div style="width:8px;height:'+ch+'px;background:#2ecc71;border-radius:2px 2px 0 0" title="Done: '+w.completed+'"></div>';
    h+='</div><div style="font-size:8px;color:#888;white-space:nowrap">'+w.label+'</div></div>';
  });
  h+='</div><div style="display:flex;gap:12px;font-size:10px;color:#888"><span><span style="display:inline-block;width:8px;height:8px;background:#3498db;border-radius:2px;margin-right:3px"></span>Created</span>';
  h+='<span><span style="display:inline-block;width:8px;height:8px;background:#2ecc71;border-radius:2px;margin-right:3px"></span>Completed</span></div></div>';

  // Velocity & average close time
  const last4=weeks.slice(-4);
  const avgPerWeek=last4.reduce((s,w)=>s+w.completed,0)/4;
  const closedWithDates=done.filter(t=>t.createdDate&&t.completedDate);
  const avgDaysToClose=closedWithDates.length?Math.round(closedWithDates.reduce((s,t)=>s+Math.max(daysBetween(t.createdDate,t.completedDate),0),0)/closedWithDates.length):0;
  const totalCreated4wk=last4.reduce((s,w)=>s+w.created,0);
  const totalCompleted4wk=last4.reduce((s,w)=>s+w.completed,0);
  const netChange=totalCreated4wk-totalCompleted4wk;

  h+='<div class="task-stats-grid" style="grid-template-columns:repeat(3,1fr);margin-top:8px">';
  h+='<div class="task-stat"><div class="val" style="color:#2ecc71">'+avgPerWeek.toFixed(1)+'</div><div class="lbl">Done/Week (4wk avg)</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:#3498db">'+avgDaysToClose+'d</div><div class="lbl">Avg Days to Close</div></div>';
  h+='<div class="task-stat"><div class="val" style="color:'+(netChange>0?'#e74c3c':'#2ecc71')+'">'+(netChange>0?'+':'')+netChange+'</div><div class="lbl">Net (4wk)</div></div></div>';

  // Cumulative open over time
  h+='<div class="digest-section"><h4>Open Task Count (last 8 weeks)</h4>';
  const openByWeek=weeks.map(w=>{
    const asOf=w.monISO;
    return S.tasks.filter(t=>{
      const created=t.createdDate<=asOf;
      const notYetDone=t.status==='open'||(t.completedDate&&t.completedDate>asOf);
      return created&&notYetDone;
    }).length;
  });
  const maxOpen=Math.max(...openByWeek,1);
  h+='<div style="display:flex;gap:2px;align-items:flex-end;height:60px;margin-bottom:4px">';
  openByWeek.forEach((cnt,i)=>{
    const bh=Math.max(Math.round(cnt/maxOpen*50),2);
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center">';
    h+='<div style="font-size:9px;color:#cc6633;margin-bottom:2px">'+cnt+'</div>';
    h+='<div style="width:100%;height:'+bh+'px;background:#cc6633;border-radius:2px 2px 0 0;opacity:0.7"></div>';
    h+='<div style="font-size:8px;color:#888;white-space:nowrap">'+weeks[i].label+'</div></div>';
  });
  h+='</div></div>';

  return h;
}

// Auto-generate check-in tasks based on employee cadence
function generateCheckinTasks(){
  const today=todayISO();let g=0;
  S.employees.forEach(emp=>{
    // Skip if there's already an open check-in task for this employee
    const hasOpen=S.tasks.some(t=>t.devCheckinEmpId===emp.id&&t.status==='open');
    if(hasOpen)return;
    const status=empCheckinStatus(emp);
    if(status==='overdue'||status==='none'){
      const shop=S.shops.find(s=>s.id===emp.shopId);
      S.tasks.push({id:uid(),title:'Check in with '+emp.name+(shop?' — '+shop.name:''),shopId:emp.shopId||'regional',priority:2,category:'staffing',assignedTo:'',taskMode:'onsite',dueDate:today,estMins:30,notes:'Dev check-in · '+esc(emp.currentRole)+(emp.targetRole?' → '+emp.targetRole:''),status:'open',createdDate:today,completedDate:'',completionNote:'',devCheckinEmpId:emp.id});
      g++;
    }
  });
  if(g){save();toast(g+' dev check-in'+(g>1?'s':'')+' added to tasks')}
}

// ========== VISIT PREP (look-ahead: today + next 2 days) ==========
function renderVisitPrep(){
  const today=todayISO();
  const lookahead=[];
  for(let i=0;i<3;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const dISO=fmtDateISO(d);
    const wm=loadWeekMeta(getMonday(d));
    const planned=(wm.plannedVisits&&wm.plannedVisits[dISO])||[];
    const reqs=(wm.dayReqs&&wm.dayReqs[dISO])||[];
    const ids=new Set();
    planned.forEach(s=>ids.add(s));
    reqs.forEach(r=>ids.add(r.shopId));
    if(ids.size)lookahead.push({date:dISO,shopIds:[...ids],label:i===0?'TODAY':i===1?'TOMORROW':fmtDate(dISO)});
  }
  if(!lookahead.length)return '<div class="visit-prep"><h4>Visit Prep</h4><div style="font-size:12px;color:#888">No shops scheduled. <a href="#" id="visit-prep-link" style="color:#cc6633">Set up schedule &rarr;</a></div></div>';
  const open=S.tasks.filter(t=>t.status==='open');
  let h='<div class="visit-prep"><h4>Visit Prep</h4>';
  lookahead.forEach(day=>{
    h+='<div style="font-size:10px;color:#cc6633;margin-top:8px;font-weight:700;letter-spacing:1px">'+esc(day.label)+'</div>';
    day.shopIds.forEach(sid=>{
      const shop=S.shops.find(s=>s.id===sid);
      const tasks=open.filter(t=>t.shopId===sid&&t.taskMode==='onsite').sort((a,b)=>a.priority-b.priority);
      h+='<div class="visit-prep-shop">'+esc(shop?shop.name:'?');
      if(tasks.length)h+=' <span style="color:#888;font-weight:400">('+tasks.length+' task'+(tasks.length>1?'s':'')+')</span>';
      h+='</div>';
      tasks.forEach(t=>{
        h+='<div style="font-size:12px;padding:3px 0;display:flex;gap:6px;align-items:center"><span class="badge badge-p'+t.priority+'" style="font-size:10px">P'+t.priority+'</span><span>'+esc(t.title)+'</span>';
        if(t.assignedTo)h+='<span class="badge badge-delegated" style="font-size:10px">'+esc(t.assignedTo)+'</span>';
        h+='</div>';
      });
      if(!tasks.length)h+='<div style="font-size:11px;color:#888;padding:2px 0">No on-site tasks</div>';
    });
  });
  return h+'</div>';
}

// ========== RECURRING TEMPLATES ==========
const RECURRENCE_OPTIONS=['monthly','quarterly','annually'];
function checkAndGenerateTemplates(){const now=todayISO();let g=0;S.taskTemplates.forEach(tmpl=>{if(!tmpl.on)return;const d=tmpl.lastGenerated?daysBetween(tmpl.lastGenerated,now):999;let th=30;if(tmpl.recurrence==='quarterly')th=85;if(tmpl.recurrence==='annually')th=360;if(d>=th){if(tmpl.scope==='each-shop'){S.shops.forEach(s=>{S.tasks.push({id:uid(),title:tmpl.title+' — '+s.name,shopId:s.id,priority:tmpl.priority,category:tmpl.category,assignedTo:'',taskMode:tmpl.taskMode||'onsite',dueDate:calcDue(now,tmpl.dueDays),estMins:tmpl.estMins||0,notes:'Auto from: '+tmpl.title,status:'open',createdDate:now,completedDate:'',completionNote:''})})}else{S.tasks.push({id:uid(),title:tmpl.title,shopId:tmpl.shopId||'regional',priority:tmpl.priority,category:tmpl.category,assignedTo:'',taskMode:tmpl.taskMode||'onsite',dueDate:calcDue(now,tmpl.dueDays),estMins:tmpl.estMins||0,notes:'Auto from: '+tmpl.title,status:'open',createdDate:now,completedDate:'',completionNote:''})}tmpl.lastGenerated=now;g++}});if(g){save();toast(g+' recurring task'+(g>1?'s':'')+' generated')}}
function calcDue(from,days){if(!days)return '';const d=new Date(from+'T00:00:00');d.setDate(d.getDate()+days);return fmtDateISO(d)}

function renderTemplatesSection(){
  let h='<h3 style="font-size:14px;margin:16px 0 8px">Recurring Templates</h3><button class="btn btn-sm btn-primary" id="add-template-btn" style="margin-bottom:8px">+ ADD</button>';
  if(!S.taskTemplates.length)return h+'<p style="color:#888;font-size:13px">No templates yet.</p>';
  S.taskTemplates.forEach(t=>{const sl=t.scope==='each-shop'?'All shops':(t.shopId==='regional'?'Regional':(S.shops.find(s=>s.id===t.shopId)||{}).name||'?');
    h+='<div class="tmpl-card'+(t.on?'':' disabled')+'"><div class="tmpl-info"><div>'+esc(t.title)+'</div><div class="tmpl-sub">'+esc(t.recurrence)+' · P'+t.priority+' · '+esc(t.category)+' · '+esc(sl);if(t.dueDays)h+=' · due '+t.dueDays+'d';if(t.lastGenerated)h+=' · last: '+fmtDate(t.lastGenerated);h+='</div></div>';
    h+='<div style="display:flex;gap:4px"><button class="btn btn-sm '+(t.on?'btn-secondary':'btn-primary')+' tmpl-toggle" data-id="'+esc(t.id)+'">'+(t.on?'ON':'OFF')+'</button><button class="btn btn-sm btn-secondary tmpl-edit" data-id="'+esc(t.id)+'">EDIT</button><button class="btn btn-sm btn-danger tmpl-del" data-id="'+esc(t.id)+'">✕</button></div></div>'});return h;
}

function openTemplateModal(existing){
  const mc=document.getElementById('modal-content');let h='<h3>'+(existing?'Edit':'Add')+' Template</h3>';
  h+='<label>Title</label><input type="text" id="m-tmpl-title" value="'+(existing?esc(existing.title):'')+'">';
  h+='<label>Scope</label><select id="m-tmpl-scope"><option value="single"'+(existing&&existing.scope==='single'?' selected':'')+'>Single Shop / Regional</option><option value="each-shop"'+(existing&&existing.scope==='each-shop'?' selected':'')+'>Each Shop (creates one task per shop)</option></select>';
  h+='<div id="m-tmpl-shop-row"><label>Shop</label><select id="m-tmpl-shop"><option value="regional"'+(existing&&existing.shopId==='regional'?' selected':'')+'>Regional</option>';
  S.shops.forEach(s=>{h+='<option value="'+esc(s.id)+'"'+(existing&&existing.shopId===s.id?' selected':'')+'>'+esc(s.name)+'</option>'});h+='</select></div>';
  h+='<label>Recurrence</label><select id="m-tmpl-rec">';RECURRENCE_OPTIONS.forEach(r=>{h+='<option value="'+r+'"'+(existing&&existing.recurrence===r?' selected':'')+'>'+r+'</option>'});h+='</select>';
  h+='<label>Priority</label><select id="m-tmpl-pri">';[1,2,3].forEach(p=>{h+='<option value="'+p+'"'+(existing&&existing.priority===p?' selected':(!existing&&p===2?' selected':''))+'>P'+p+'</option>'});h+='</select>';
  h+='<label>Category</label><select id="m-tmpl-cat">';TASK_CATEGORIES.forEach(c=>{h+='<option value="'+esc(c)+'"'+(existing&&existing.category===c?' selected':'')+'>'+esc(c)+'</option>'});h+='</select>';
  h+='<label>Due in days</label><input type="number" id="m-tmpl-due" min="1" value="'+(existing&&existing.dueDays?existing.dueDays:'')+'">';
  h+='<label>Est Minutes</label><input type="number" id="m-tmpl-hrs" step="5" min="0" value="'+(existing&&existing.estMins?existing.estMins:existing&&existing.estHours?Math.round(existing.estHours*60):'')+'">';
  h+='<label>Task Mode</label><select id="m-tmpl-mode">';TASK_MODES.forEach(m=>{h+='<option value="'+m.id+'"'+((existing?existing.taskMode===m.id:m.id==='remote')?' selected':'')+'>'+m.icon+' '+m.label+'</option>'});h+='</select>';
  h+='<button class="btn btn-primary btn-block" id="m-tmpl-save">'+(existing?'SAVE':'ADD')+'</button><button class="btn btn-secondary btn-block" id="m-tmpl-cancel">CANCEL</button>';
  mc.innerHTML=h;openModal();
  const ss=document.getElementById('m-tmpl-scope'),sr=document.getElementById('m-tmpl-shop-row');
  ss.addEventListener('change',()=>{sr.style.display=ss.value==='each-shop'?'none':'block'});if(ss.value==='each-shop')sr.style.display='none';
  document.getElementById('m-tmpl-save').addEventListener('click',()=>{
    const title=document.getElementById('m-tmpl-title').value.trim();if(!title){toast('Title required',true);return}
    const scope=ss.value,shopId=scope==='each-shop'?'':document.getElementById('m-tmpl-shop').value;
    const rec=document.getElementById('m-tmpl-rec').value,pri=parseInt(document.getElementById('m-tmpl-pri').value),cat=document.getElementById('m-tmpl-cat').value;
    const dd=parseInt(document.getElementById('m-tmpl-due').value)||0,mins=parseInt(document.getElementById('m-tmpl-hrs').value)||0;
    const taskMode=document.getElementById('m-tmpl-mode').value;
    if(existing){existing.title=title;existing.scope=scope;existing.shopId=shopId;existing.recurrence=rec;existing.priority=pri;existing.category=cat;existing.dueDays=dd;existing.estMins=mins;existing.taskMode=taskMode;delete existing.estHours}
    else{S.taskTemplates.push({id:uid(),title,scope,shopId,recurrence:rec,priority:pri,category:cat,dueDays:dd,estMins:mins,taskMode,on:true,lastGenerated:''})}
    save();closeModal();checkAndGenerateTemplates();renderTasks();toast(existing?'Updated':'Added')});
  document.getElementById('m-tmpl-cancel').addEventListener('click',closeModal);
}

// ========== GLOBAL EXPORT/IMPORT ==========
document.getElementById('g-export').addEventListener('click',()=>{
  // Collect week metadata from localStorage
  const weekMeta={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('crfo_w_')){try{weekMeta[k]=JSON.parse(localStorage.getItem(k))}catch(e){}}}
  const exportData={...S,_weekMeta:weekMeta};
  const b=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='cr-field-ops-backup.json';a.click();URL.revokeObjectURL(u);toast('Exported')});
document.getElementById('g-import').addEventListener('click',()=>{document.getElementById('g-import-file').click()});
document.getElementById('g-import-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.shops){toast('Invalid file',true);return}
  // Restore week metadata if present
  if(imp._weekMeta){Object.entries(imp._weekMeta).forEach(([k,v])=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}});delete imp._weekMeta}
  S=imp;save();toast('Imported — reloading...');setTimeout(()=>location.reload(),1000)}catch(err){toast('Error: '+err.message,true)}};r.readAsText(f)});
document.getElementById('g-merge').addEventListener('click',()=>{document.getElementById('g-merge-file').click()});
document.getElementById('g-merge-file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.shops){toast('Invalid file',true);return}
  let count=0;
  // Merge visits (dedupe by shopId+date)
  if(Array.isArray(imp.visits)){const existing=new Set(S.visits.map(v=>v.shopId+'_'+v.date));imp.visits.forEach(v=>{const k=v.shopId+'_'+v.date;if(!existing.has(k)){S.visits.push(v);existing.add(k);count++}})}
  // Merge perfData (dedupe by periodId+shopId)
  if(Array.isArray(imp.perfData)){const existing=new Set(S.perfData.map(r=>r.periodId+'_'+r.shopId));imp.perfData.forEach(r=>{const k=r.periodId+'_'+r.shopId;if(!existing.has(k)){S.perfData.push(r);existing.add(k);count++}})}
  // Merge shopMetrics
  if(imp.shopMetrics){Object.entries(imp.shopMetrics).forEach(([k,v])=>{if(!S.shopMetrics[k]){S.shopMetrics[k]=v;count++}})}
  save();toast('Merged '+count+' records');setTimeout(()=>location.reload(),1000);
}catch(err){toast('Error: '+err.message,true)}};r.readAsText(f)});
