<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CR Field Ops</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
/* TABS */
.tab-bar{display:flex;background:#16213e;border-top:1px solid #0f3460;position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab-btn{flex:1;padding:10px 2px;text-align:center;font-size:11px;font-weight:600;color:#7a7a9a;background:none;border:none;cursor:pointer;transition:color .2s}
.tab-btn.active{color:#e94560;border-top:2px solid #e94560}
.page{display:none;padding:12px 12px 70px 12px;flex:1}
.page.active{display:block}
/* CARDS */
.card{background:#16213e;border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid #0f3460}
.card-title{font-weight:700;font-size:15px;margin-bottom:4px}
.card-sub{font-size:12px;color:#7a7a9a}
.card-meta{font-size:12px;margin-top:6px;color:#a0a0c0}
/* STATUS COLORS */
.card.green{border-left-color:#2ecc71}.card.yellow{border-left-color:#f39c12}.card.red{border-left-color:#e74c3c}.card.grey{border-left-color:#555}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-green{background:#1a3a2a;color:#2ecc71}.badge-yellow{background:#3a3520;color:#f39c12}.badge-red{background:#3a1a1a;color:#e74c3c}.badge-grey{background:#2a2a2a;color:#888}
/* BUTTONS */
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary{background:#e94560;color:#fff}.btn-primary:hover{background:#c73e54}
.btn-secondary{background:#0f3460;color:#e0e0e0}.btn-secondary:hover{background:#1a4a80}
.btn-danger{background:#5a1a1a;color:#e74c3c}.btn-danger:hover{background:#7a2a2a}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-block{display:block;width:100%;margin-top:8px}
/* FORMS */
input,select,textarea{background:#0f1a35;border:1px solid #2a3a5a;border-radius:6px;padding:10px;color:#e0e0e0;font-size:14px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#e94560}
label{display:block;font-size:12px;color:#7a7a9a;margin:8px 0 4px}
/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#16213e;border-radius:12px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:12px;color:#e94560}
/* WEEK */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-nav h3{font-size:15px}
.day-block{background:#16213e;border-radius:10px;margin-bottom:8px;overflow:hidden}
.day-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.day-header h4{font-size:14px}
.day-body{display:none;padding:0 14px 14px;border-top:1px solid #0f3460}
.day-body.open{display:block}
.day-badges{display:flex;gap:4px;flex-wrap:wrap}
.chip{display:inline-block;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid #2a3a5a;margin:2px;transition:all .2s;user-select:none}
.chip.on{background:#e94560;border-color:#e94560;color:#fff}
.chip.wfh{background:#3498db;border-color:#3498db;color:#fff}
/* RULES */
.rule-section{margin-bottom:20px}
.rule-section h3{font-size:14px;margin-bottom:8px;padding-left:4px}
.rule-card{background:#0f1a35;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.rule-card.disabled{opacity:.4}
.rule-text{flex:1;font-size:13px;line-height:1.4}
.rule-actions{display:flex;gap:4px;flex-shrink:0}
.rule-section.constraints .rule-card{border-left:3px solid #3498db}
.rule-section.routing .rule-card{border-left:3px solid #e67e22}
.rule-section.traffic .rule-card{border-left:3px solid #2ecc71}
/* PROMPT PREVIEW */
.prompt-box{background:#0a0f1e;border:1px solid #2a3a5a;border-radius:8px;padding:12px;margin:10px 0;max-height:50vh;overflow-y:auto}
.prompt-box textarea{min-height:200px;font-size:12px;font-family:monospace}
/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.error{background:#e74c3c}
/* INLINE CONFIRM */
.confirm-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.confirm-row .msg{font-size:12px;color:#e74c3c}
/* HISTORY FILTER */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-row select{width:auto;flex:1}
/* EVENT ROW */
.ev-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f3460;font-size:13px}
.ev-row:last-child{border-bottom:none}
/* WEEK NEEDS */
.week-needs{background:#0f1a35;border-radius:10px;padding:12px;margin-bottom:12px}
.week-needs h4{font-size:12px;color:#7a7a9a;margin-bottom:6px}
.wfh-days{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.wfh-chip{padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid #2a3a5a;user-select:none;transition:all .2s}
.wfh-chip.on{background:#3498db;border-color:#3498db;color:#fff}
/* PERF */
.perf-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px}
.perf-row{background:#16213e;border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.perf-shop{font-weight:600;font-size:13px;flex:1;min-width:120px}
.perf-checks{display:flex;gap:10px}
.perf-check{display:flex;align-items:center;gap:4px;font-size:11px;color:#7a7a9a}
.perf-check input[type=checkbox]{width:auto;accent-color:#2ecc71}
.perf-check.hit{color:#2ecc71}.perf-check.miss{color:#e74c3c}
.perf-visits{font-size:12px;color:#a0a0c0;min-width:50px;text-align:right}
.period-select{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.chart-container{background:#16213e;border-radius:10px;padding:14px;margin-bottom:12px;position:relative;height:280px}
.perf-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.perf-stat{background:#16213e;border-radius:8px;padding:12px;text-align:center}
.perf-stat .val{font-size:22px;font-weight:700}.perf-stat .lbl{font-size:11px;color:#7a7a9a;margin-top:2px}
</style>
</head>
<body>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="week">WEEK</button>
  <button class="tab-btn" data-tab="status">STATUS</button>
  <button class="tab-btn" data-tab="perf">PERF</button>
  <button class="tab-btn" data-tab="upcoming">UPCOMING</button>
  <button class="tab-btn" data-tab="rules">RULES</button>
  <button class="tab-btn" data-tab="shops">SHOPS</button>
  <button class="tab-btn" data-tab="history">HISTORY</button>
</div>

<!-- PAGES -->
<div id="pg-status" class="page"></div>
<div id="pg-week" class="page active"></div>
<div id="pg-upcoming" class="page"></div>
<div id="pg-history" class="page"></div>
<div id="pg-shops" class="page"></div>
<div id="pg-rules" class="page"></div>
<div id="pg-perf" class="page"></div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay">
  <div id="modal-content" class="modal"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
// ========== UTILITIES ==========
let _uid=0;
function uid(){return Date.now().toString(36)+'_'+(++_uid)}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isoDate(s){if(!s)return '';const d=new Date(s);if(isNaN(d))return s;return d.toISOString().slice(0,10)}
function toast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isErr?' error':'')+' show';setTimeout(()=>t.className='toast',2500)}

// ========== STATE ==========
const DEFAULT_STATE={
  shops:[
    {id:'s1',name:'ABD Frederick',location:'5702 Industry Ln, Frederick MD',driveMin:55,freq:'2x/month'},
    {id:'s2',name:'ABD Gaithersburg',location:'7559 Rickenbacker Dr, Gaithersburg MD',driveMin:60,freq:'2x/month'},
    {id:'s3',name:'ABD Bethesda',location:'4709 Chase Ave, Bethesda MD',driveMin:55,freq:'0-1x/month'},
    {id:'s4',name:'Suburban Herndon',location:'765 Center St, Herndon VA',driveMin:75,freq:'1-2x/month'},
    {id:'s5',name:'Suburban Fredericksburg',location:'136 Fleming St, Fredericksburg VA',driveMin:90,freq:'1x/month'},
    {id:'s6',name:'T-Body',location:'643 Barbour Pike, Mt. Clare WV',driveMin:150,freq:'1x/month'},
    {id:'s7',name:'CarCraft Collision',location:'7616 Backlick Rd, Springfield VA',driveMin:60,freq:'1-2x/month'},
    {id:'s8',name:"JR's Auto Body",location:'121 Mercedes Ct, Winchester VA',driveMin:90,freq:'1-2x/month'},
    {id:'s9',name:"Bucky's Auto Body",location:'35 Restoration St, Martinsburg WV',driveMin:90,freq:'2x/month'}
  ],
  visits:[],
  upcoming:[],
  constraints:[
    {id:uid(),text:"Based in Canton, Baltimore MD. Son dropped at daycare in Nottingham MD at 8am most days. Partner can cover drop off if needed, usually 2-4 times/week total between dropoff and pickup.",on:true},
    {id:uid(),text:"Daycare pickup 5:00-5:45pm. Partner can cover pickup if needed — overnight stays or late returns are an option worth suggesting when it saves excessive driving.",on:true},
    {id:uid(),text:"Leave any shop by 3pm latest on pickup days to allow time home and avoid peak traffic.",on:true},
    {id:uid(),text:"2-3 hours at each shop per visit.",on:true},
    {id:uid(),text:"Target at least 2 WFH days per week.",on:true},
    {id:uid(),text:"On single-shop days, may return home after daycare dropoff (~30 min ride) to work and wait 30-90 min for morning traffic to clear before departing.",on:true},
    {id:uid(),text:"For very distant shops (T-Body ~4hrs, Fredericksburg ~2.5-3hrs each way), suggest overnight nearby if it saves 7-8hrs driving in one day and partner can handle pickup. Flag as option, don't assume.",on:true}
  ],
  routing:[
    {id:uid(),text:"T-Body (Mt. Clare WV) and Suburban Fredericksburg: visit once/month unless otherwise needed. Skip in weekly suggestions unless overdue or flagged.",on:true},
    {id:uid(),text:"Any two of ABD Gaithersburg, ABD Frederick, ABD Bethesda are a natural same-day pair — close proximity and efficient routing.",on:true},
    {id:uid(),text:"Bucky's (Martinsburg WV) and JR's (Winchester VA) are a natural same-day pair.",on:true},
    {id:uid(),text:"ABD Frederick can alternatively pair with Bucky's or JR's instead of Gaithersburg.",on:true},
    {id:uid(),text:"CarCraft (Springfield VA) and Suburban Herndon can be done in one day but less common — only suggest if both overdue or flagged.",on:true},
    {id:uid(),text:"ABD Bethesda is visited less frequently. Deprioritize unless overdue.",on:true}
  ],
  traffic:[
    {id:uid(),text:"Any commute out of Baltimore 6:30-8:45am or into Baltimore 3:45-6:30pm: add ~20 min. Includes daycare trips since it's north and requires going through/past the city.",on:true},
    {id:uid(),text:"Any leg on I-495 or I-95 in DC/Northern VA area: add ~30 min to that leg.",on:true},
    {id:uid(),text:"Driver uses standard major highway routes but will use live GPS to avoid issues. Don't overcompensate — apply adjustments once.",on:true}
  ],
  fiscalPeriods:[
    {id:'fp1',name:'JAN 2026',start:'2026-01-01',end:'2026-01-31'},
    {id:'fp2',name:'FEB 2026',start:'2026-02-01',end:'2026-02-28'},
    {id:'fp3',name:'MAR 2026',start:'2026-03-01',end:'2026-04-04'},
    {id:'fp4',name:'APR 2026',start:'2026-04-05',end:'2026-05-02'},
    {id:'fp5',name:'MAY 2026',start:'2026-05-03',end:'2026-05-30'},
    {id:'fp6',name:'JUN 2026',start:'2026-05-31',end:'2026-07-04'},
    {id:'fp7',name:'JUL 2026',start:'2026-07-05',end:'2026-08-01'},
    {id:'fp8',name:'AUG 2026',start:'2026-08-02',end:'2026-08-29'},
    {id:'fp9',name:'SEP 2026',start:'2026-08-30',end:'2026-10-03'},
    {id:'fp10',name:'OCT 2026',start:'2026-10-04',end:'2026-10-31'},
    {id:'fp11',name:'NOV 2026',start:'2026-11-01',end:'2026-11-28'},
    {id:'fp12',name:'DEC 2026',start:'2026-11-29',end:'2026-12-31'}
  ],
  perfData:[]
};

let S;
function loadState(){
  try{
    const raw=localStorage.getItem('crfo_state');
    if(raw){
      const parsed=JSON.parse(raw);
      // Merge with defaults for any missing keys
      S={...DEFAULT_STATE,...parsed};
      if(!Array.isArray(S.shops)||!S.shops.length)S.shops=JSON.parse(JSON.stringify(DEFAULT_STATE.shops));
      // Backfill freq from defaults onto saved shops missing it
      S.shops.forEach(s=>{if(!s.freq){const def=DEFAULT_STATE.shops.find(d=>d.id===s.id);if(def)s.freq=def.freq}});
      if(!Array.isArray(S.fiscalPeriods)||!S.fiscalPeriods.length)S.fiscalPeriods=JSON.parse(JSON.stringify(DEFAULT_STATE.fiscalPeriods));
      if(!Array.isArray(S.perfData))S.perfData=[];
      // Clean up: remove empties, remove gp, deduplicate, remove orphaned period refs
      S.perfData=S.perfData.filter(r=>r.sales||r.ebitda);
      S.perfData.forEach(r=>{delete r.gp});
      const seen={};
      S.perfData=S.perfData.filter(r=>{const k=r.periodId+'_'+r.shopId;if(seen[k])return false;seen[k]=true;return true});
      const validPeriodIds=new Set(S.fiscalPeriods.map(p=>p.id));
      S.perfData=S.perfData.filter(r=>validPeriodIds.has(r.periodId));
      if(!Array.isArray(S.visits))S.visits=[];
      if(!Array.isArray(S.upcoming))S.upcoming=[];
      if(!Array.isArray(S.constraints))S.constraints=DEFAULT_STATE.constraints;
      if(!Array.isArray(S.routing))S.routing=DEFAULT_STATE.routing;
      if(!Array.isArray(S.traffic))S.traffic=DEFAULT_STATE.traffic;
    } else {
      S=JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  }catch(e){
    console.error('State load error, using defaults:',e);
    S=JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}

function save(){
  try{localStorage.setItem('crfo_state',JSON.stringify(S))}
  catch(e){toast('Storage error: '+e.message,true)}
}

// Week meta (per-week needs, WFH, events)
function weekKey(d){const mon=getMonday(d);return 'crfo_w_'+mon.toISOString().slice(0,10)}
function loadWeekMeta(d){
  try{const raw=localStorage.getItem(weekKey(d));return raw?JSON.parse(raw):{shopsNeeded:[],wfhDays:[],dayReqs:{},dayEvents:{}}}
  catch(e){return {shopsNeeded:[],wfhDays:[],dayReqs:{},dayEvents:{}}}
}
function saveWeekMeta(d,meta){
  try{localStorage.setItem(weekKey(d),JSON.stringify(meta))}
  catch(e){toast('Storage error: '+e.message,true)}
}
function pruneOldWeeks(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-56);
  for(let i=localStorage.length-1;i>=0;i--){
    const k=localStorage.key(i);
    if(k&&k.startsWith('crfo_w_')){
      const ds=k.replace('crfo_w_','');
      if(ds<cutoff.toISOString().slice(0,10))localStorage.removeItem(k);
    }
  }
}

// ========== DATE HELPERS ==========
function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDate(d){const dt=typeof d==='string'?new Date(d+'T00:00:00'):d;return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fmtDateISO(d){const dt=typeof d==='string'?new Date(d+'T00:00:00'):d;return dt.toISOString().slice(0,10)}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(86400000))}
function todayISO(){return new Date().toISOString().slice(0,10)}
const DAYNAMES=['Monday','Tuesday','Wednesday','Thursday','Friday'];

// ========== TABS ==========
document.querySelector('.tab-bar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');if(!btn)return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pg-'+btn.dataset.tab).classList.add('active');
  renderPage(btn.dataset.tab);
});
function renderPage(tab){
  switch(tab){
    case 'status':renderStatus();break;
    case 'week':renderWeek();break;
    case 'upcoming':renderUpcoming();break;
    case 'history':renderHistory();break;
    case 'shops':renderShops();break;
    case 'rules':renderRules();break;
    case 'perf':renderPerf();break;
  }
}

// ========== STATUS PAGE ==========
function shopStatus(shop){
  const now=todayISO();
  const monthStart=now.slice(0,8)+'01';
  const shopVisits=S.visits.filter(v=>v.shopId===shop.id).sort((a,b)=>b.date.localeCompare(a.date));
  const last=shopVisits.length?shopVisits[0]:null;
  const visitedThisMonth=shopVisits.some(v=>v.date>=monthStart);
  const daysAgo=last?daysBetween(last.date,now):null;
  let urgency='red';
  if(visitedThisMonth&&daysAgo!==null&&daysAgo<=14)urgency='green';
  else if(visitedThisMonth)urgency='yellow';
  return {last,visitedThisMonth,daysAgo,urgency,visitCount:shopVisits.length};
}

function renderStatus(){
  const el=document.getElementById('pg-status');
  if(!S.shops.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#7a7a9a"><p>No shops added yet.</p><p style="margin-top:8px">Go to the SHOPS tab to add your locations.</p></div>';return}
  const sorted=[...S.shops].map(s=>({...s,status:shopStatus(s)})).sort((a,b)=>{
    const ord={red:0,yellow:1,green:2};
    if(ord[a.status.urgency]!==ord[b.status.urgency])return ord[a.status.urgency]-ord[b.status.urgency];
    if(a.status.daysAgo===null)return -1;if(b.status.daysAgo===null)return 1;
    return b.status.daysAgo-a.status.daysAgo;
  });
  let h='<h2 style="margin-bottom:12px">Shop Status</h2>';
  sorted.forEach(s=>{
    const st=s.status;
    const daysText=st.daysAgo===null?'NEVER':''+st.daysAgo+' day'+(st.daysAgo===1?'':'s')+' ago';
    const badgeClass=st.urgency==='green'?'badge-green':st.urgency==='yellow'?'badge-yellow':'badge-red';
    const monthBadge=st.visitedThisMonth?'<span class="badge badge-green">This month</span>':'<span class="badge badge-red">Not this month</span>';
    h+='<div class="card '+st.urgency+'" data-shop-id="'+esc(s.id)+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div class="card-title">'+esc(s.name)+'</div><div class="card-sub">'+esc(s.location)+'</div></div>';
    h+='<div style="text-align:right"><span class="badge '+badgeClass+'">'+daysText+'</span><br>'+monthBadge+'</div></div>';
    h+='<div style="margin-top:8px"><button class="btn btn-primary btn-sm log-visit-btn" data-id="'+esc(s.id)+'">LOG VISIT</button></div>';
    h+='</div>';
  });
  el.innerHTML=h;
  el.querySelectorAll('.log-visit-btn').forEach(btn=>{
    btn.addEventListener('click',()=>openLogVisit(btn.dataset.id));
  });
}

function openLogVisit(shopId){
  const shop=S.shops.find(s=>s.id===shopId);if(!shop)return;
  const mc=document.getElementById('modal-content');
  mc.innerHTML='<h3>Log Visit — '+esc(shop.name)+'</h3>'
    +'<label>Date</label><input type="date" id="m-visit-date" value="'+todayISO()+'">'
    +'<label>Notes (optional)</label><textarea id="m-visit-notes" rows="3" placeholder="What did you cover?"></textarea>'
    +'<button class="btn btn-primary btn-block" id="m-visit-save">SAVE VISIT</button>'
    +'<button class="btn btn-secondary btn-block" id="m-visit-cancel">CANCEL</button>';
  openModal();
  document.getElementById('m-visit-save').addEventListener('click',()=>{
    const date=isoDate(document.getElementById('m-visit-date').value);
    if(!date){toast('Pick a date',true);return}
    S.visits.push({id:uid(),shopId,date,notes:document.getElementById('m-visit-notes').value.trim()});
    save();closeModal();renderPage('status');toast('Visit logged');
  });
  document.getElementById('m-visit-cancel').addEventListener('click',closeModal);
}

// ========== WEEK PAGE ==========
let currentWeekStart=getMonday(new Date());

function renderWeek(){
  const el=document.getElementById('pg-week');
  const meta=loadWeekMeta(currentWeekStart);
  const weekEnd=addDays(currentWeekStart,4);
  let h='<div class="week-nav">';
  h+='<button class="btn btn-sm btn-secondary" id="week-prev">&lsaquo; Prev</button>';
  h+='<h3>'+fmtDate(currentWeekStart)+' — '+fmtDate(weekEnd)+'</h3>';
  h+='<button class="btn btn-sm btn-secondary" id="week-next">Next &rsaquo;</button>';
  h+='</div>';

  // Weekly shop needs — shopsNeeded is now [{shopId,note},...] or legacy [id,...]
  // Normalize legacy format
  if(meta.shopsNeeded.length&&typeof meta.shopsNeeded[0]==='string'){
    meta.shopsNeeded=meta.shopsNeeded.map(id=>({shopId:id,note:'anytime'}));
    saveWeekMeta(currentWeekStart,meta);
  }
  const SHOP_NOTES=['off','anytime','AM','PM','full day','most of day'];
  h+='<div class="week-needs"><h4>SHOPS NEEDED THIS WEEK (tap to cycle)</h4><div id="week-shop-chips">';
  S.shops.forEach(s=>{
    const entry=meta.shopsNeeded.find(x=>x.shopId===s.id);
    const note=entry?entry.note:'off';
    const on=note!=='off';
    h+='<span class="chip'+(on?' on':'')+'" data-shop-id="'+esc(s.id)+'" data-note="'+esc(note)+'">'+esc(s.name)+(on?' ('+esc(note)+')':'')+'</span>';
  });
  h+='</div>';
  h+='<h4 style="margin-top:10px">WFH DAYS</h4><div class="wfh-days" id="week-wfh-chips">';
  DAYNAMES.forEach((dn,i)=>{
    const dateStr=fmtDateISO(addDays(currentWeekStart,i));
    const on=meta.wfhDays.includes(dateStr);
    h+='<span class="wfh-chip'+(on?' on':'')+'" data-date="'+dateStr+'">'+dn.slice(0,3)+'</span>';
  });
  h+='</div></div>';

  // Days
  for(let i=0;i<5;i++){
    const dayDate=addDays(currentWeekStart,i);
    const dateStr=fmtDateISO(dayDate);
    const isWFH=meta.wfhDays.includes(dateStr);
    const reqs=(meta.dayReqs&&meta.dayReqs[dateStr])||[];
    const evts=(meta.dayEvents&&meta.dayEvents[dateStr])||[];
    // Check if blocked by upcoming
    const blocked=S.upcoming.some(u=>dateStr>=u.start&&dateStr<=u.end);

    h+='<div class="day-block">';
    h+='<div class="day-header" data-date="'+dateStr+'">';
    h+='<div><h4>'+DAYNAMES[i]+' '+fmtDate(dayDate)+'</h4>';
    h+='<div class="day-badges">';
    if(blocked)h+='<span class="badge badge-grey">BLOCKED</span> ';
    if(isWFH)h+='<span class="badge" style="background:#1a3a5a;color:#3498db">WFH</span> ';
    reqs.forEach(r=>{
      const shop=S.shops.find(s=>s.id===r.shopId);
      if(shop)h+='<span class="badge" style="background:#3a2a10;color:#e67e22">'+esc(shop.name)+(r.timing?' ('+esc(r.timing)+')':'')+'</span> ';
    });
    h+='</div></div><span style="color:#7a7a9a">&#9662;</span></div>';

    h+='<div class="day-body" id="day-body-'+dateStr+'">';
    // Required visits for this day
    h+='<div style="margin-bottom:8px"><button class="btn btn-sm btn-secondary add-day-req" data-date="'+dateStr+'">+ Required Visit</button></div>';
    reqs.forEach((r,ri)=>{
      const shop=S.shops.find(s=>s.id===r.shopId);
      h+='<div class="ev-row"><span>📍 '+esc(shop?shop.name:'?')+(r.timing?' — '+esc(r.timing):'')+'</span>';
      h+='<button class="btn btn-sm btn-danger del-day-req" data-date="'+dateStr+'" data-idx="'+ri+'">✕</button></div>';
    });
    // Events
    h+='<div style="margin:8px 0"><button class="btn btn-sm btn-secondary add-day-ev" data-date="'+dateStr+'">+ Add Event</button></div>';
    evts.forEach((ev,ei)=>{
      h+='<div class="ev-row"><span>'+esc(ev.title)+(ev.timing?' — '+esc(ev.timing):'')+'</span>';
      h+='<button class="btn btn-sm btn-danger del-day-ev" data-date="'+dateStr+'" data-idx="'+ei+'">✕</button></div>';
    });
    h+='</div></div>';
  }

  // Actions
  h+='<div style="margin-top:16px">';
  h+='<button class="btn btn-primary btn-block" id="gen-prompt">📋 GENERATE & COPY SCHEDULE PROMPT</button>';
  h+='<button class="btn btn-secondary btn-block" id="preview-prompt">👁 PREVIEW PROMPT</button>';
  h+='<div id="prompt-preview-area" style="display:none"></div>';
  h+='</div>';

  el.innerHTML=h;

  // Event listeners — week nav
  document.getElementById('week-prev').addEventListener('click',()=>{currentWeekStart=addDays(currentWeekStart,-7);renderWeek()});
  document.getElementById('week-next').addEventListener('click',()=>{currentWeekStart=addDays(currentWeekStart,7);renderWeek()});

  // Shop need chips
  el.querySelectorAll('#week-shop-chips .chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const m=loadWeekMeta(currentWeekStart);
      // Normalize legacy
      if(m.shopsNeeded.length&&typeof m.shopsNeeded[0]==='string')m.shopsNeeded=m.shopsNeeded.map(id=>({shopId:id,note:'anytime'}));
      const sid=chip.dataset.shopId;
      const cur=chip.dataset.note||'off';
      const idx=SHOP_NOTES.indexOf(cur);
      const next=SHOP_NOTES[(idx+1)%SHOP_NOTES.length];
      m.shopsNeeded=m.shopsNeeded.filter(x=>x.shopId!==sid);
      if(next!=='off')m.shopsNeeded.push({shopId:sid,note:next});
      saveWeekMeta(currentWeekStart,m);renderWeek();
    });
  });

  // WFH chips
  el.querySelectorAll('#week-wfh-chips .wfh-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const m=loadWeekMeta(currentWeekStart);
      const d=chip.dataset.date;
      if(m.wfhDays.includes(d))m.wfhDays=m.wfhDays.filter(x=>x!==d);
      else m.wfhDays.push(d);
      saveWeekMeta(currentWeekStart,m);renderWeek();
    });
  });

  // Day headers toggle
  el.querySelectorAll('.day-header').forEach(hdr=>{
    hdr.addEventListener('click',()=>{
      const body=document.getElementById('day-body-'+hdr.dataset.date);
      body.classList.toggle('open');
    });
  });

  // Add required visit buttons
  el.querySelectorAll('.add-day-req').forEach(btn=>{
    btn.addEventListener('click',()=>openDayReq(btn.dataset.date));
  });

  // Delete required visit buttons
  el.querySelectorAll('.del-day-req').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const m=loadWeekMeta(currentWeekStart);
      const d=btn.dataset.date;
      if(!m.dayReqs)m.dayReqs={};
      if(!m.dayReqs[d])return;
      m.dayReqs[d].splice(parseInt(btn.dataset.idx),1);
      saveWeekMeta(currentWeekStart,m);renderWeek();
    });
  });

  // Add event buttons
  el.querySelectorAll('.add-day-ev').forEach(btn=>{
    btn.addEventListener('click',()=>openDayEvent(btn.dataset.date));
  });

  // Delete event buttons
  el.querySelectorAll('.del-day-ev').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const m=loadWeekMeta(currentWeekStart);
      const d=btn.dataset.date;
      if(!m.dayEvents)m.dayEvents={};
      if(!m.dayEvents[d])return;
      m.dayEvents[d].splice(parseInt(btn.dataset.idx),1);
      saveWeekMeta(currentWeekStart,m);renderWeek();
    });
  });

  // Prompt buttons
  document.getElementById('gen-prompt').addEventListener('click',()=>{
    const prompt=buildPrompt();
    navigator.clipboard.writeText(prompt).then(()=>{
      toast('Prompt copied to clipboard! Paste into Claude.');
    }).catch(()=>{
      // Fallback: show it for manual copy
      showPromptPreview(prompt,true);
      toast('Couldn\'t auto-copy. Select and copy manually.',true);
    });
  });
  document.getElementById('preview-prompt').addEventListener('click',()=>{
    const area=document.getElementById('prompt-preview-area');
    if(area.style.display==='none'){
      showPromptPreview(buildPrompt(),false);
    }else{
      area.style.display='none';
    }
  });
}

function showPromptPreview(prompt,forceShow){
  const area=document.getElementById('prompt-preview-area');
  area.style.display='block';
  area.innerHTML='<div class="prompt-box"><textarea id="prompt-textarea">'+esc(prompt)+'</textarea></div>'
    +'<button class="btn btn-primary btn-sm" id="copy-prompt-btn">📋 COPY TO CLIPBOARD</button>';
  document.getElementById('copy-prompt-btn').addEventListener('click',()=>{
    const txt=document.getElementById('prompt-textarea').value;
    navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast('Select and copy manually',true));

// ========== PROMPT BUILDER ==========
function buildPrompt(){
  const meta=loadWeekMeta(currentWeekStart);
  const weekEnd=addDays(currentWeekStart,4);
  let p='Plan a Mon-Fri work week for a regional manager who visits auto body shops across MD, VA, and WV from a home base in Canton, Baltimore. ';
  p+='Monthly visit targets vary by shop. Prioritize shops behind their target, then those most overdue, while grouping shops by geography to minimize total drive time.\n\n';

  // Constraints
  const activeC=S.constraints.filter(c=>c.on);
  if(activeC.length){p+='CONSTRAINTS:\n';activeC.forEach(c=>{p+='- '+c.text+'\n'});p+='\n'}

  // Routing
  const activeR=S.routing.filter(r=>r.on);
  if(activeR.length){p+='ROUTING RULES:\n';activeR.forEach(r=>{p+='- '+r.text+'\n'});p+='\n'}

  // Traffic
  const activeT=S.traffic.filter(t=>t.on);
  if(activeT.length){p+='TRAFFIC RULES:\n';activeT.forEach(t=>{p+='- '+t.text+'\n'});p+='\n'}

  // Shop status
  const now=todayISO();
  const monthStart=now.slice(0,8)+'01';
  p+='SHOP STATUS:\n';
  S.shops.forEach(s=>{
    const st=shopStatus(s);
    const daysText=st.daysAgo===null?'NEVER VISITED':''+st.daysAgo+' day'+(st.daysAgo===1?'':'s')+' ago';
    const monthText=st.visitedThisMonth?'visited this month':'NOT YET THIS MONTH';
    p+='- '+s.name+' ('+s.location+', ~'+s.driveMin+' min, target: '+(s.freq||'1x/month')+'): '+daysText+' ['+monthText+']\n';
  });
  p+='\n';

  // Week context
  p+='WEEK: '+fmtDateISO(currentWeekStart)+' to '+fmtDateISO(weekEnd)+'\n';

  // WFH days
  if(meta.wfhDays.length){
    p+='WFH days: '+meta.wfhDays.map(d=>fmtDate(d)).join(', ')+'\n';
  }

  // Shops needed this week
  if(meta.shopsNeeded.length){
    const items=meta.shopsNeeded.map(x=>{
      const s=S.shops.find(sh=>sh.id===(x.shopId||x));
      const name=s?s.name:'?';
      const note=(x.note&&x.note!=='anytime')?' ('+x.note+')':'';
      return name+note;
    });
    p+='Must visit this week (flexible on which day unless noted): '+items.join(', ')+'\n';
    p+='Timing key — AM: ~9:30am-11:30am, PM: ~12:30pm-3:00pm, most of day: ~9:30am-3:00pm, full day: ~8:00am-5:00pm.\n';
  }

  // Day-specific requirements
  for(let i=0;i<5;i++){
    const dateStr=fmtDateISO(addDays(currentWeekStart,i));
    const reqs=(meta.dayReqs&&meta.dayReqs[dateStr])||[];
    const evts=(meta.dayEvents&&meta.dayEvents[dateStr])||[];
    const blocked=S.upcoming.some(u=>dateStr>=u.start&&dateStr<=u.end);
    const parts=[];
    if(blocked)parts.push('BLOCKED — unavailable');
    reqs.forEach(r=>{
      const shop=S.shops.find(s=>s.id===r.shopId);
      if(shop)parts.push('must visit '+shop.name+(r.timing?' ('+r.timing+')':''));
    });
    evts.forEach(ev=>{
      parts.push(ev.title+(ev.timing?' ('+ev.timing+')':''));
    });
    if(parts.length){
      p+=DAYNAMES[i]+': '+parts.join('; ')+'\n';
    }
  }

  p+='\nGenerate 3 schedule options for this week. For each option, list: departure time, shops visited with approximate arrival/leave times, and whether partner covers dropoff or pickup. No addresses, no drive time breakdowns, no traffic explanations — I already know all that. Just the plan.';
  p+='\n\nAfter each option, include a simplified version I can send to my boss in this format (shop names only, no cities or addresses — he knows where they are):\nM- location\nTu- location\nW- location\nTh- location\nF- location';
  return p;
}

    h+='<div class="confirm-row" id="confirm-shop-'+esc(s.id)+'" style="display:none">';
    h+='<span class="msg">Remove '+esc(s.name)+' and all visit history?</span>';
    h+='<button class="btn btn-sm btn-danger confirm-yes-shop" data-id="'+esc(s.id)+'">YES</button>';
    h+='<button class="btn btn-sm btn-secondary confirm-no-shop" data-id="'+esc(s.id)+'">NO</button>';
    h+='</div></div>';
  });
  el.innerHTML=h;

  document.getElementById('add-shop').addEventListener('click',()=>openShopModal());
  document.getElementById('export-data').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='cr-field-ops-backup.json';a.click();
    URL.revokeObjectURL(url);toast('Data exported');
  });
  document.getElementById('import-data').addEventListener('click',()=>{
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!imported.shops){toast('Invalid backup file',true);return}
        S=imported;save();
        toast('Data imported — reloading...');
        setTimeout(()=>location.reload(),1000);
      }catch(err){toast('Failed to read file: '+err.message,true)}
    };
    reader.readAsText(file);
  });
  el.querySelectorAll('.edit-shop').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const s=S.shops.find(x=>x.id===btn.dataset.id);
      if(s)openShopModal(s);
    });
  });
  el.querySelectorAll('.remove-shop').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.getElementById('confirm-shop-'+btn.dataset.id).style.display='flex';
    });
  });
  el.querySelectorAll('.confirm-yes-shop').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id;
      S.shops=S.shops.filter(s=>s.id!==id);
      S.visits=S.visits.filter(v=>v.shopId!==id);
      save();renderShops();toast('Shop removed');
    });
  });
  el.querySelectorAll('.confirm-no-shop').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.getElementById('confirm-shop-'+btn.dataset.id).style.display='none';
    });
  });
}

function openShopModal(existing){
  const mc=document.getElementById('modal-content');
  mc.innerHTML='<h3>'+(existing?'Edit':'Add')+' Shop</h3>'
    +'<label>Name</label><input type="text" id="m-shop-name" value="'+(existing?esc(existing.name):'')+'" placeholder="e.g. ABD Frederick">'
    +'<label>Location</label><input type="text" id="m-shop-loc" value="'+(existing?esc(existing.location):'')+'" placeholder="e.g. Frederick, MD">'
    +'<label>Drive Time from Canton (minutes)</label><input type="number" id="m-shop-drive" value="'+(existing?existing.driveMin:'')+'" placeholder="e.g. 60">'
    +'<label>Visit Frequency</label><input type="text" id="m-shop-freq" value="'+(existing?esc(existing.freq||''):'')+'" placeholder="e.g. 2x/month, 1-2x/month">'
    +'<button class="btn btn-primary btn-block" id="m-shop-save">SAVE</button>'
    +'<button class="btn btn-secondary btn-block" id="m-shop-cancel">CANCEL</button>';
  openModal();
  document.getElementById('m-shop-save').addEventListener('click',()=>{
    const name=document.getElementById('m-shop-name').value.trim();
    const loc=document.getElementById('m-shop-loc').value.trim();
    const drive=parseInt(document.getElementById('m-shop-drive').value)||0;
    if(!name||!loc){toast('Name and location required',true);return}
    const freq=document.getElementById('m-shop-freq').value.trim()||'1x/month';
    if(existing){existing.name=name;existing.location=loc;existing.driveMin=drive;existing.freq=freq}
    else{S.shops.push({id:uid(),name,location:loc,driveMin:drive,freq})}
    save();closeModal();renderShops();toast(existing?'Updated':'Shop added');
  });
  document.getElementById('m-shop-cancel').addEventListener('click',closeModal);
}

// ========== RULES PAGE ==========
function renderRules(){
  const el=document.getElementById('pg-rules');
  let h='<h2 style="margin-bottom:12px">Rules & Constraints</h2>';
  h+='<p style="font-size:12px;color:#7a7a9a;margin-bottom:16px">Everything here is fed directly into the schedule prompt. What you see is exactly what the AI gets.</p>';

  // Constraints
  h+='<div class="rule-section constraints"><h3 style="color:#3498db">Personal Constraints</h3>';
  h+=renderRuleList(S.constraints,'c');
  h+='<button class="btn btn-sm btn-secondary add-rule" data-type="c" style="margin-top:4px">+ ADD CONSTRAINT</button></div>';

  // Routing
  h+='<div class="rule-section routing"><h3 style="color:#e67e22">Routing Rules</h3>';
  h+=renderRuleList(S.routing,'r');
  h+='<button class="btn btn-sm btn-secondary add-rule" data-type="r" style="margin-top:4px">+ ADD ROUTING RULE</button></div>';

  // Traffic
  h+='<div class="rule-section traffic"><h3 style="color:#2ecc71">Traffic Rules</h3>';
  h+=renderRuleList(S.traffic,'t');
  h+='<button class="btn btn-sm btn-secondary add-rule" data-type="t" style="margin-top:4px">+ ADD TRAFFIC RULE</button></div>';

  el.innerHTML=h;

  // Toggle listeners
  el.querySelectorAll('.rule-toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const arr=getRuleArr(btn.dataset.rtype);
      const item=arr.find(x=>x.id===btn.dataset.id);
      if(item){item.on=!item.on;save();renderRules()}
    });
  });

  // Edit listeners
  el.querySelectorAll('.rule-edit').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const arr=getRuleArr(btn.dataset.rtype);
      const item=arr.find(x=>x.id===btn.dataset.id);
      if(item)openRuleEdit(item,btn.dataset.rtype);
    });
  });

  // Delete listeners
  el.querySelectorAll('.rule-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const rtype=btn.dataset.rtype;
      if(rtype==='c')S.constraints=S.constraints.filter(x=>x.id!==btn.dataset.id);
      else if(rtype==='r')S.routing=S.routing.filter(x=>x.id!==btn.dataset.id);
      else S.traffic=S.traffic.filter(x=>x.id!==btn.dataset.id);
      save();renderRules();toast('Deleted');
    });
  });

  // Add listeners
  el.querySelectorAll('.add-rule').forEach(btn=>{
    btn.addEventListener('click',()=>openRuleAdd(btn.dataset.type));
  });
}

function renderRuleList(arr,rtype){
  let h='';
  arr.forEach(item=>{
    h+='<div class="rule-card'+(item.on?'':' disabled')+'">';
    h+='<div class="rule-text">'+esc(item.text)+'</div>';
    h+='<div class="rule-actions">';
    h+='<button class="btn btn-sm '+(item.on?'btn-secondary':'btn-primary')+' rule-toggle" data-id="'+esc(item.id)+'" data-rtype="'+rtype+'">'+(item.on?'ON':'OFF')+'</button>';
    h+='<button class="btn btn-sm btn-secondary rule-edit" data-id="'+esc(item.id)+'" data-rtype="'+rtype+'">✏️</button>';
    h+='<button class="btn btn-sm btn-danger rule-del" data-id="'+esc(item.id)+'" data-rtype="'+rtype+'">✕</button>';
    h+='</div></div>';
  });
  return h;
}

function getRuleArr(rtype){
  if(rtype==='c')return S.constraints;
  if(rtype==='r')return S.routing;
  return S.traffic;
}

function openRuleEdit(item,rtype){
  const mc=document.getElementById('modal-content');
  mc.innerHTML='<h3>Edit Rule</h3>'
    +'<textarea id="m-rule-text" rows="4">'+esc(item.text)+'</textarea>'
    +'<button class="btn btn-primary btn-block" id="m-rule-save">SAVE</button>'
    +'<button class="btn btn-secondary btn-block" id="m-rule-cancel">CANCEL</button>';
  openModal();
  document.getElementById('m-rule-save').addEventListener('click',()=>{
    const txt=document.getElementById('m-rule-text').value.trim();
    if(!txt){toast('Rule text required',true);return}
    item.text=txt;save();closeModal();renderRules();toast('Updated');
  });
  document.getElementById('m-rule-cancel').addEventListener('click',closeModal);
}

function openRuleAdd(rtype){
  const mc=document.getElementById('modal-content');
  const labels={c:'Constraint',r:'Routing Rule',t:'Traffic Rule'};
  mc.innerHTML='<h3>Add '+labels[rtype]+'</h3>'
    +'<textarea id="m-rule-text" rows="4" placeholder="Write in plain language..."></textarea>'
    +'<button class="btn btn-primary btn-block" id="m-rule-save">ADD</button>'
    +'<button class="btn btn-secondary btn-block" id="m-rule-cancel">CANCEL</button>';
  openModal();
  document.getElementById('m-rule-save').addEventListener('click',()=>{
    const txt=document.getElementById('m-rule-text').value.trim();
    if(!txt){toast('Rule text required',true);return}
    const arr=getRuleArr(rtype);
    arr.push({id:uid(),text:txt,on:true});
    save();closeModal();renderRules();toast('Added');
  });
  document.getElementById('m-rule-cancel').addEventListener('click',closeModal);
}

// ========== PERFORMANCE PAGE ==========
let perfChart=null;
let selectedPeriodId=null;

function renderPerf(){
  const el=document.getElementById('pg-perf');
  const perfShops=S.shops.filter(s=>s.id!=='s3');
  const N=perfShops.length; // 8
  let h='<h2 style="margin-bottom:12px">Performance</h2>';

  // Period selector
  h+='<div class="period-select">';
  h+='<select id="perf-period-sel" style="flex:1"><option value="">Select period...</option>';
  S.fiscalPeriods.sort((a,b)=>b.start.localeCompare(a.start)).forEach(p=>{
    h+='<option value="'+esc(p.id)+'"'+(p.id===selectedPeriodId?' selected':'')+'>'+esc(p.name)+' ('+p.start+' to '+p.end+')</option>';
  });
  h+='</select>';
  h+='<button class="btn btn-sm btn-primary" id="add-period-btn">+ PERIOD</button>';
  h+='<button class="btn btn-sm btn-danger" id="del-period-btn">✕</button>';
  h+='</div>';

  // Data entry grid for selected period
  const period=S.fiscalPeriods.find(p=>p.id===selectedPeriodId);
  if(period){
    // Count hits for this period
    let pSales=0,pEbitda=0;
    h+='<h3 style="font-size:14px;margin-bottom:8px">'+esc(period.name)+'</h3>';
    h+='<div class="perf-grid">';
    perfShops.forEach(s=>{
      const rec=perfGet(period.id,s.id);
      const visits=countVisits(s.id,period.start,period.end);
      if(rec.sales)pSales++;
      if(rec.ebitda)pEbitda++;
      h+='<div class="perf-row">';
      h+='<div class="perf-shop">'+esc(s.name)+'</div>';
      h+='<div class="perf-checks">';
      h+='<label class="perf-check'+(rec.sales?' hit':'')+'"><input type="checkbox" data-shop="'+esc(s.id)+'" data-field="sales"'+(rec.sales?' checked':'')+'>Sales</label>';
      h+='<label class="perf-check'+(rec.ebitda?' hit':'')+'"><input type="checkbox" data-shop="'+esc(s.id)+'" data-field="ebitda"'+(rec.ebitda?' checked':'')+'>EBITDA</label>';
      h+='</div>';
      h+='<div class="perf-visits">'+visits+' visit'+(visits===1?'':'s')+'</div>';
      h+='</div>';
    });
    h+='</div>';
    // Period summary
    h+='<div class="perf-summary" style="grid-template-columns:repeat(3,1fr)">';
    h+='<div class="perf-stat"><div class="val" style="color:#3498db">'+pSales+'/'+N+'</div><div class="lbl">Sales Budget</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#e67e22">'+pEbitda+'/'+N+'</div><div class="lbl">EBITDA Budget</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#2ecc71">'+(pSales+pEbitda)+'/'+(N*2)+'</div><div class="lbl">Overall</div></div>';
    h+='</div>';
  }

  // Chart
  if(S.fiscalPeriods.length>=1){
    h+='<h3 style="font-size:14px;margin:16px 0 8px">Visits & Budget Performance by Period</h3>';
    h+='<div class="chart-container"><canvas id="perf-chart"></canvas></div>';

    // All-time summary
    const periodsWithData=[...new Set(S.perfData.filter(r=>r.shopId!=='s3').map(r=>r.periodId))];
    const pdCount=periodsWithData.length;
    let allSales=0,allEbitda=0;
    S.perfData.filter(r=>r.shopId!=='s3').forEach(r=>{if(r.sales)allSales++;if(r.ebitda)allEbitda++});
    const allTotal=allSales+allEbitda;
    const allPossible=pdCount*N*2;
    h+='<div class="perf-summary" style="grid-template-columns:repeat(4,1fr)">';
    h+='<div class="perf-stat"><div class="val" style="color:#3498db">'+(pdCount?Math.round(allSales/(pdCount*N)*100):0)+'%</div><div class="lbl">Sales Hit Rate</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#e67e22">'+(pdCount?Math.round(allEbitda/(pdCount*N)*100):0)+'%</div><div class="lbl">EBITDA Hit Rate</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#e94560">'+(allPossible?Math.round(allTotal/allPossible*100):0)+'%</div><div class="lbl">Overall Hit Rate</div></div>';
    h+='<div class="perf-stat"><div class="val" style="color:#2ecc71">'+pdCount+'</div><div class="lbl">Periods w/ Data</div></div>';
    h+='</div>';
  }

  if(!S.fiscalPeriods.length){
    h+='<p style="color:#7a7a9a;text-align:center;padding:20px">Add a fiscal period to start tracking. Check off which shops hit Sales and EBITDA budgets — visit counts come from your history automatically.</p>';
  }

  el.innerHTML=h;

  // Listeners
  document.getElementById('perf-period-sel').addEventListener('change',e=>{
    selectedPeriodId=e.target.value||null;renderPerf();
  });
  document.getElementById('add-period-btn').addEventListener('click',openAddPeriod);
  document.getElementById('del-period-btn').addEventListener('click',()=>{
    if(!selectedPeriodId)return;
    S.fiscalPeriods=S.fiscalPeriods.filter(p=>p.id!==selectedPeriodId);
    S.perfData=S.perfData.filter(r=>r.periodId!==selectedPeriodId);
    selectedPeriodId=null;save();renderPerf();toast('Period deleted');
  });
  el.querySelectorAll('.perf-checks input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      if(!selectedPeriodId)return;
      perfSet(selectedPeriodId,cb.dataset.shop,cb.dataset.field,cb.checked);
      renderPerf();
    });
  });
  if(S.fiscalPeriods.length>=1)drawPerfChart();
}

// Perf data helpers — simple and explicit
function perfGet(periodId,shopId){
  const rec=S.perfData.find(r=>r.periodId===periodId&&r.shopId===shopId);
  return rec||{sales:false,ebitda:false};
}

function perfSet(periodId,shopId,field,value){
  let rec=S.perfData.find(r=>r.periodId===periodId&&r.shopId===shopId);
  if(!rec){rec={id:uid(),periodId,shopId,sales:false,ebitda:false};S.perfData.push(rec)}
  rec[field]=value;
  save();
}

function countVisits(shopId,start,end){
  return S.visits.filter(v=>v.shopId===shopId&&v.date>=start&&v.date<=end).length;
}

function openAddPeriod(){
  const mc=document.getElementById('modal-content');
  mc.innerHTML='<h3>Add Fiscal Period</h3>'
    +'<label>Name</label><input type="text" id="m-per-name" placeholder="e.g. FY26 P3 (March)">'
    +'<label>Start Date</label><input type="date" id="m-per-start">'
    +'<label>End Date</label><input type="date" id="m-per-end">'
    +'<button class="btn btn-primary btn-block" id="m-per-save">ADD</button>'
    +'<button class="btn btn-secondary btn-block" id="m-per-cancel">CANCEL</button>';
  openModal();
  document.getElementById('m-per-save').addEventListener('click',()=>{
    const name=document.getElementById('m-per-name').value.trim();
    const start=isoDate(document.getElementById('m-per-start').value);
    const end=isoDate(document.getElementById('m-per-end').value);
    if(!name||!start||!end){toast('Fill in all fields',true);return}
    const p={id:uid(),name,start,end};
    S.fiscalPeriods.push(p);selectedPeriodId=p.id;
    save();closeModal();renderPerf();toast('Period added');
  });
  document.getElementById('m-per-cancel').addEventListener('click',closeModal);
}

function drawPerfChart(){
  const canvas=document.getElementById('perf-chart');
  if(!canvas)return;
  if(perfChart){perfChart.destroy();perfChart=null}

  const perfShops=S.shops.filter(s=>s.id!=='s3');
  const N=perfShops.length;
  const sorted=[...S.fiscalPeriods].sort((a,b)=>a.start.localeCompare(b.start));
  const labels=sorted.map(p=>p.name);

  // Per period: total visits across all shops, sales hit count, ebitda hit count
  const totalVisits=sorted.map(p=>perfShops.reduce((sum,s)=>sum+countVisits(s.id,p.start,p.end),0));
  const salesPct=sorted.map(p=>{
    let hits=0;perfShops.forEach(s=>{if(perfGet(p.id,s.id).sales)hits++});
    return Math.round(hits/N*100);
  });
  const ebitdaPct=sorted.map(p=>{
    let hits=0;perfShops.forEach(s=>{if(perfGet(p.id,s.id).ebitda)hits++});
    return Math.round(hits/N*100);
  });
  const overallPct=sorted.map(p=>{
    let hits=0;perfShops.forEach(s=>{const r=perfGet(p.id,s.id);if(r.sales)hits++;if(r.ebitda)hits++});
    return Math.round(hits/(N*2)*100);
  });

  perfChart=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {type:'bar',label:'Total Visits',data:totalVisits,backgroundColor:'rgba(52,152,219,0.5)',borderColor:'rgba(52,152,219,1)',borderWidth:1,yAxisID:'y1',order:4},
        {type:'line',label:'Sales Hit %',data:salesPct,borderColor:'#3498db',borderWidth:2,pointRadius:4,tension:0.3,yAxisID:'y',order:1},
        {type:'line',label:'EBITDA Hit %',data:ebitdaPct,borderColor:'#e67e22',borderWidth:2,pointRadius:4,tension:0.3,yAxisID:'y',order:2},
        {type:'line',label:'Overall Hit %',data:overallPct,borderColor:'#2ecc71',borderWidth:3,pointRadius:5,tension:0.3,yAxisID:'y',order:3}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#e0e0e0',font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>ctx.dataset.yAxisID==='y1'?ctx.parsed.y+' visits':ctx.parsed.y+'%'}}
      },
      scales:{
        y:{position:'left',min:0,max:100,ticks:{color:'#7a7a9a',callback:v=>v+'%'},grid:{color:'#1a2a4a'},title:{display:true,text:'Hit Rate %',color:'#7a7a9a'}},
        y1:{position:'right',min:0,ticks:{color:'#7a7a9a',stepSize:1},grid:{display:false},title:{display:true,text:'Total Visits',color:'#7a7a9a'}},
        x:{ticks:{color:'#7a7a9a',maxRotation:45},grid:{color:'#1a2a4a'}}
      }
    }
  });
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});

loadState();
pruneOldWeeks();
renderPage('week');
